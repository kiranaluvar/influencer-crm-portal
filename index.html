<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#0f172a" />
  <title>Influencer CRM — BrightChamps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --brand:      #4060f0;
      --brand-dark: #3050e0;
      --brand-soft: #eaf0ff;
      --bc-yellow:  #f0d000;
      --bc-orange:  #f08000;
      --bc-green:   #40d060;
      --bc-cyan:    #40c0f0;
      --bc-red:     #f04040;
    }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .btn-brand { background-color: var(--brand); color: white; }
    .btn-brand:hover { background-color: var(--brand-dark); }
    .btn-brand:disabled { opacity: 0.5; cursor: not-allowed; }
    .text-brand { color: var(--brand); }
    .text-brand:hover { color: var(--brand-dark); }
    .border-brand { border-color: var(--brand); }
    .ring-brand:focus { box-shadow: 0 0 0 2px var(--brand); outline: none; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .modal-backdrop { background: rgba(15,23,42,0.5); backdrop-filter: blur(2px); }
    .fade-in { animation: fade 0.15s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @media (max-width: 768px) {
      .sidebar-mobile { transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar-mobile.open { transform: translateX(0); }
    }
    /* Heatmap cell colors */
    .heatmap-cell { color: #fff; font-size: 11px; padding: 4px 6px; text-align: center; min-width: 32px; }
    /* Responsive table rows: stack vertically on mobile */
    @media (max-width: 767px) {
      .crm-row {
        grid-template-columns: 1fr !important;
        row-gap: 6px;
        padding: 14px 16px;
      }
      .crm-row > * { min-width: 0; }
      .crm-row .crm-avatar { display: none; }
      .crm-row-cell-secondary { color: #64748b; font-size: 12px; }
    }
  </style>
</head>

    // ===============================================================

    // ===============================================================
    const $  = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const el = (tag, attrs = {}, ...children) => {
      const n = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => {
        if (k === 'class') n.className = v;
        else if (k === 'html') n.innerHTML = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), v);
        else if (v !== false && v != null) n.setAttribute(k, v);
      });
      children.flat().forEach(c => {
        if (c == null || c === false) return;
        n.appendChild(c.nodeType ? c : document.createTextNode(c));
      });
      return n;
    };

    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
    const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
    const escape = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    const groupStatusColor = (g) => ({
      'Scraping':             'bg-slate-100 text-slate-700',
      'Screening':            'bg-blue-50 text-blue-700',
      'Negotiation':          'bg-amber-50 text-amber-800',
      'Integration Planning': 'bg-purple-50 text-purple-700',
      'Documents':            'bg-indigo-50 text-indigo-700',
      'Gone Live':            'bg-emerald-50 text-emerald-700',
      'Post Gone Live':       'bg-emerald-100 text-emerald-900',
      'Dropped':              'bg-rose-50 text-rose-700',
    }[g] || 'bg-slate-100 text-slate-700');

    // --- UI helpers (Direction 3 design system) ---
    const AVATAR_PALETTE = [
      { bg: '#FEE2E2', fg: '#B91C1C' }, // red
      { bg: '#E0E7FF', fg: '#3730A3' }, // indigo
      { bg: '#DCFCE7', fg: '#166534' }, // green
      { bg: '#FEF3C7', fg: '#92400E' }, // amber
      { bg: '#F3E8FF', fg: '#6B21A8' }, // purple
      { bg: '#FCE7F3', fg: '#9D174D' }, // pink
      { bg: '#CCFBF1', fg: '#115E59' }, // teal
      { bg: '#FFEDD5', fg: '#9A3412' }, // orange
    ];
    const avatarColor = (name) => {
      const s = String(name || '?');
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
      return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
    };
    function avatar(name, size = 28) {
      const c = avatarColor(name);
      const initial = String(name || '?').trim().charAt(0).toUpperCase();
      return el('div', {
        class: 'flex items-center justify-center font-medium shrink-0',
        style: `width:${size}px;height:${size}px;border-radius:6px;background:${c.bg};color:${c.fg};font-size:${Math.max(11, Math.round(size*0.4))}px;`
      }, initial);
    }

    function pageHeader(eyebrow, title, subtitle, actions) {
      return el('div', { class: 'mb-5' },
        eyebrow ? el('div', { class: 'text-[10px] font-semibold text-slate-400 uppercase tracking-[0.08em] mb-1.5' }, eyebrow) : null,
        el('div', { class: 'flex items-end justify-between gap-4 flex-wrap' },

          actions ? el('div', { class: 'flex gap-2 items-center' }, ...(Array.isArray(actions) ? actions.filter(Boolean) : [actions])) : null
        )
      );

    function subtleBadge(text, variant = 'slate') {
      const map = {
        slate:   'bg-slate-100 text-slate-700',
        info:    'bg-blue-50 text-blue-700',
        warning: 'bg-amber-50 text-amber-800',
        success: 'bg-emerald-50 text-emerald-700',
        livedark:'bg-emerald-100 text-emerald-900',
        purple:  'bg-purple-50 text-purple-700',
        indigo:  'bg-indigo-50 text-indigo-700',
        rose:    'bg-rose-50 text-rose-700',
      };
      return el('span', { class: `inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium ${map[variant] || map.slate}` }, text);
    }

    function kpiTile(label, value, valueColor = 'text-slate-900') {
      return el('div', { class: 'bg-slate-50 rounded-md px-3 py-2.5' },
        el('div', { class: 'text-[10px] text-slate-500 uppercase tracking-wide font-medium' }, label),
        el('div', { class: `text-[18px] font-semibold mt-0.5 ${valueColor}` }, String(value))
      );
    }

    function pipelineStrip(counts, onClick) {
      // counts: array of { group, count } in canonical order
      const order = ['Scraping','Screening','Negotiation','Integration Planning','Documents','Gone Live','Post Gone Live','Dropped'];
      const variants = { 'Scraping':'slate', 'Screening':'info', 'Negotiation':'warning', 'Integration Planning':'purple', 'Documents':'indigo', 'Gone Live':'success', 'Post Gone Live':'livedark', 'Dropped':'rose' };
      const labels =   { 'Scraping':'Scraping', 'Screening':'Screening', 'Negotiation':'Negotiation', 'Integration Planning':'Integration Planning', 'Documents':'Documents', 'Gone Live':'Gone Live', 'Post Gone Live':'Post Live', 'Dropped':'Dropped' };
      const lookup = Object.fromEntries((counts || []).map(c => [c.group, c.count]));
      return el('div', { class: 'grid grid-cols-4 sm:grid-cols-8 gap-1.5 mb-5' },
        ...order.map(g => {
          const v = variants[g];
          const cls = subtleBadge('', v).className; // reuse color mapping
          return el('button', {
            class: `text-left px-3 py-2 rounded-md ${cls.replace('inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium ','')} hover:ring-1 hover:ring-slate-300 transition`,
            onClick: () => onClick && onClick(g),
          },
            el('div', { class: 'text-[10px] uppercase tracking-wide font-medium opacity-80' }, labels[g]),
            el('div', { class: 'text-[16px] font-semibold mt-0.5' }, String(lookup[g] || 0))
          );
        })
      );
    }

    const toast = (msg, type = 'info') => {
      const colors = { info: 'bg-slate-900', success: 'bg-emerald-600', error: 'bg-rose-600' };
      const t = el('div', { class: `fixed bottom-6 left-1/2 -translate-x-1/2 ${colors[type]} text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50 fade-in` }, msg);
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    };

    const confirmModal = (msg) => new Promise(res => {

          el('button', { class: 'px-3 py-1.5 text-sm rounded-md bg-slate-900 text-white hover:bg-slate-800', onClick: () => { m.close(); res(true); } }, 'Confirm')
        )
      ));

    // ===============================================================
    // AUTH
    // ===============================================================
    async function signIn() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          queryParams: { hd: ALLOWED_DOMAIN, prompt: 'select_account' },
          redirectTo: window.location.origin + window.location.pathname,
        },
      });
      if (error) toast(error.message, 'error');
    }

    async function signOut() {
      await supabase.auth.signOut();
      window.location.reload();
    }

    async function loadMe() {
      const { data, error } = await supabase.from('team_members')
        .select('*').eq('user_id', state.session.user.id).maybeSingle();
      if (error) { console.error(error); return null; }
      return data;
    }

    async function ensureSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return false;
      // Domain check
      const email = session.user.email || '';
      if (!email.toLowerCase().endsWith('@' + ALLOWED_DOMAIN)) {
        await supabase.auth.signOut();
        toast(`Access restricted to @${ALLOWED_DOMAIN} accounts`, 'error');
        return false;
      }
      state.session = session;
      state.me = await loadMe();
      return true;
    }

    // ===============================================================
    // DATA: FILTER OPTIONS (cached)
    // ===============================================================
    async function loadFilterOptions() {
      if (state.filterOptions) return state.filterOptions;
      const { data, error } = await supabase.rpc('filter_options');
      if (error) { console.error(error); return null; }
      state.filterOptions = data;
      return data;
    }

    async function refreshOverdueCount() {
      const { count } = await supabase.from('campaigns').select('id', { count: 'exact', head: true })
        .eq('owner_id', state.me.user_id)
        .lt('next_followup_at', new Date().toISOString())
        .not('group_status', 'in', '("Dropped","Post Gone Live")');
      state.overdueCount = count || 0;
    }

    // ===============================================================
    // DATA: CAMPAIGNS LIST
    // ===============================================================
    async function fetchCampaigns() {
      const L = state.lists.campaigns;
      const from = (L.page - 1) * PAGE_SIZE;
      const to   = from + PAGE_SIZE - 1;

      const sel = `
        id, name, sub_status, group_status, owner_id, next_followup_at, updated_at, created_at,
        platform:platforms!inner ( id, platform, username, followers, imported_poc, profile:profiles!inner ( id, name, lead_type ) ),
        owner:team_members!campaigns_owner_id_fkey ( full_name )
      `;

      const applyFilters = (q) => {
        if (L.filters.group_status) q = q.eq('group_status', L.filters.group_status);
        if (L.filters.sub_status)   q = q.eq('sub_status', L.filters.sub_status);
        if (L.filters.owner_id)     q = q.eq('owner_id', L.filters.owner_id);
        if (L.filters.platform)     q = q.eq('platforms.platform', L.filters.platform);
        if (L.filters.date_from)    q = q.gte('created_at', L.filters.date_from);
        if (L.filters.date_to)      q = q.lte('created_at', L.filters.date_to + 'T23:59:59');
        return q;
      };

      if (L.search) {
        // Multi-query merge: search by campaign name, platform username, influencer name in parallel
        const s = L.search;
        const [a, b, c] = await Promise.all([
          applyFilters(supabase.from('campaigns').select(sel)).ilike('name', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
          applyFilters(supabase.from('campaigns').select(sel)).ilike('platforms.username', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
          applyFilters(supabase.from('campaigns').select(sel)).ilike('platforms.profiles.name', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
        ]);
        if (a.error || b.error || c.error) {
          const err = a.error || b.error || c.error;
          console.error(err); toast(err.message, 'error'); return;
        }
        const merged = new Map();
        [a.data, b.data, c.data].forEach(arr => (arr || []).forEach(item => merged.set(item.id, item)));
        const all = Array.from(merged.values()).sort((x, y) => new Date(y.updated_at) - new Date(x.updated_at));
        L.total = all.length;
        L.items = all.slice(from, from + PAGE_SIZE);
      } else {
        let q = applyFilters(supabase.from('campaigns').select(sel, { count: 'exact' }))
          .order('updated_at', { ascending: false }).range(from, to);
        const { data, error, count } = await q;
        if (error) { console.error(error); toast(error.message, 'error'); return; }
        L.items = data || [];
        L.total = count || 0;
      }

      // Pipeline counts for the strip
      const { data: pc } = await supabase.rpc('dashboard_data');
      state.pipelineCounts = pc?.pipeline || [];
    }

    // ===============================================================
    // DATA: PROFILES LIST
    // ===============================================================
    async function fetchProfiles() {
      const L = state.lists.profiles;
      const from = (L.page - 1) * PAGE_SIZE;
      const to   = from + PAGE_SIZE - 1;

      let q = supabase.from('profiles').select(`
        id, name, email, phone, region, lead_type, created_at,
        owner:team_members!profiles_created_by_fkey ( full_name ),
        platforms ( id, platform, username )
      `, { count: 'exact' });

      if (L.search) q = q.or(`name.ilike.%${L.search}%,email.ilike.%${L.search}%,phone.ilike.%${L.search}%`);
      if (L.filters.lead_type) q = q.eq('lead_type', L.filters.lead_type);
      if (L.filters.created_by) q = q.eq('created_by', L.filters.created_by);

      q = q.order('created_at', { ascending: false }).range(from, to);

      const { data, error, count } = await q;
      if (error) { console.error(error); toast(error.message, 'error'); return; }
      L.items = data || [];
      L.total = count || 0;
    }

    function renderModal(title, content) {
      const backdrop = el('div', { class: 'fixed inset-0 z-40 modal-backdrop flex items-center justify-center p-4 fade-in' });
      const modal = el('div', { class: 'bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col' },
        el('div', { class: 'px-5 py-3.5 border-b border-slate-200 flex items-center justify-between' },
          el('h3', { class: 'font-semibold text-[15px] text-slate-900 tracking-tight' }, title),
          el('button', { class: 'text-slate-400 hover:text-slate-700 text-2xl leading-none', onClick: () => close() }, '×')
        ),
        el('div', { class: 'p-5 overflow-y-auto scrollbar-thin' }, content)
      );
      backdrop.appendChild(modal);
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
      document.body.appendChild(backdrop);
      function close() { backdrop.remove(); }
      return { close, el: modal };
    }

    // ===============================================================
    // ADD PROFILE FLOW
    // ===============================================================
    function openAddProfileModal() {
      const form = el('div', { class: 'space-y-3' });
      const fields = {};
      const mkField = (label, name, type = 'text', opts = {}) => {
        const wrap = el('label', { class: 'block' },
          el('span', { class: 'text-xs font-medium text-slate-600' }, label + (opts.required ? ' *' : '')),
          fields[name] = el('input', { type, name, placeholder: opts.placeholder || '', class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' })
        );
        return wrap;
      };
      const mkSelect = (label, name, options, opts = {}) => {
        const sel = el('select', { name, class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' },
          el('option', { value: '' }, '— Select —'),
          ...options.map(o => el('option', { value: o }, o))
        );
        fields[name] = sel;
        return el('label', { class: 'block' },
          el('span', { class: 'text-xs font-medium text-slate-600' }, label + (opts.required ? ' *' : '')),
          sel
        );
      };

      const leadTypeWrap = mkSelect('Lead Type', 'lead_type', ['Phone', 'Email', 'DM'], { required: true });
      const nameWrap     = mkField('Name', 'name');
      const emailWrap    = mkField('Email', 'email', 'email');
      const phoneWrap    = mkField('Phone', 'phone', 'tel');

      // Region: searchable country dropdown
      const regionSel = el('select', { name: 'region', class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' },
        el('option', { value: '' }, '— Select country —'),
        ...COUNTRIES.map(c => el('option', { value: c }, c))
      );
      fields.region = regionSel;
      const regionWrap = el('label', { class: 'block' },
        el('span', { class: 'text-xs font-medium text-slate-600' }, 'Region'),
        regionSel
      );

      // Languages: multi-select checkboxes
      const langBoxes = LANGUAGES.map(l => {
        const cb = el('input', { type: 'checkbox', value: l, class: 'rounded border-slate-300 text-blue-600 focus:ring-blue-500' });
        return el('label', { class: 'inline-flex items-center gap-1 text-xs px-2 py-1 border border-slate-200 rounded bg-slate-50 cursor-pointer hover:bg-slate-100' }, cb, l);
      });
      fields.languages = langBoxes;
      const langWrap = el('div', {},
        el('span', { class: 'text-xs font-medium text-slate-600 block mb-1' }, 'Languages Known'),
        el('div', { class: 'flex flex-wrap gap-1.5' }, ...langBoxes)
      );

      // PLATFORM SECTION (mandatory — source of the lead)
      const platSel = el('select', { class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' },
        el('option', { value: '' }, '— Select —'),
        ...['Instagram','Youtube','Facebook','Tiktok'].map(p => el('option', { value: p }, p))
      );
      fields.platform = platSel;
      const platWrap = el('label', { class: 'block' },
        el('span', { class: 'text-xs font-medium text-slate-600' }, 'Platform *'),
        platSel
      );
      const usernameWrap = mkField('Username *', 'username');
      const linkWrap     = mkField('Profile Link', 'link', 'url');
      const genreWrap    = mkField('Genre', 'genre');
      const avgViewsWrap = mkField('Avg Views (last 10 collabs)', 'avg_views', 'number');
      const followersWrap = mkField('Followers', 'followers', 'number');

      const hint = el('p', { class: 'text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5' });
      const updateHint = () => {
        const lt = fields.lead_type.value;
        if (lt === 'Phone') hint.textContent = 'Phone & Name are required. Phone must be unique system-wide.';
        else if (lt === 'Email') hint.textContent = 'Email & Name are required. Email must be unique system-wide.';
        else if (lt === 'DM') hint.textContent = 'Name is required. DM leads dedupe by name + platform username.';
        else hint.textContent = '';
      };
      fields.lead_type.addEventListener('change', updateHint);

      const sectionHeader = (label) => el('div', { class: 'pt-2 mt-2 border-t border-slate-200' },
        el('div', { class: 'text-[11px] font-semibold uppercase tracking-wide text-slate-500' }, label)
      );

      const submitBtn = el('button', { class: 'px-3 py-1.5 text-sm rounded-md btn-brand' }, 'Create Profile + Platform');
      submitBtn.addEventListener('click', async () => {
        const checkedLangs = fields.languages.filter(cb => cb.querySelector('input').checked).map(cb => cb.querySelector('input').value);
        const profilePayload = {
          lead_type: fields.lead_type.value,
          name:      fields.name.value.trim(),
          email:     fields.email.value.trim() || null,
          phone:     fields.phone.value.trim() || null,
          region:    fields.region.value || null,
          languages: checkedLangs.length ? checkedLangs : null,
          created_by: state.me.user_id,
        };
        const platformPayload = {
          platform:   fields.platform.value,
          username:   fields.username.value.trim(),
          link:       fields.link.value.trim() || null,
          genre:      fields.genre.value.trim() || null,
          avg_views:  fields.avg_views.value ? parseInt(fields.avg_views.value) : null,
          followers:  fields.followers.value ? parseInt(fields.followers.value) : null,
          created_by: state.me.user_id,
        };

        // Validation
        if (!profilePayload.lead_type) return toast('Pick a lead type', 'error');
        if (!profilePayload.name) return toast('Name is required', 'error');
        if (profilePayload.lead_type === 'Phone' && !profilePayload.phone) return toast('Phone is required for Phone lead', 'error');
        if (profilePayload.lead_type === 'Email' && !profilePayload.email) return toast('Email is required for Email lead', 'error');
        if (!platformPayload.platform) return toast('Platform is required (source of the lead)', 'error');
        if (!platformPayload.username) return toast('Platform username is required', 'error');

        submitBtn.disabled = true; submitBtn.textContent = 'Saving…';

        // 1. Insert profile
        const { data: prof, error: pErr } = await supabase.from('profiles').insert(profilePayload).select().single();
        if (pErr) {
          submitBtn.disabled = false; submitBtn.textContent = 'Create Profile + Platform';
          return toast(pErr.message, 'error');
        }

        // 2. Insert platform; rollback profile if it fails
        platformPayload.profile_id = prof.id;
        const { error: plErr } = await supabase.from('platforms').insert(platformPayload);
        if (plErr) {
          await supabase.from('profiles').delete().eq('id', prof.id);
          submitBtn.disabled = false; submitBtn.textContent = 'Create Profile + Platform';
          return toast('Platform failed: ' + plErr.message + ' (profile rolled back)', 'error');
        }

        modal.close();
        toast('Profile + platform created — default campaign in Scraping', 'success');
        if (state.route === 'campaigns') { state.lists.campaigns.page = 1; await fetchCampaigns(); render(); }
        if (state.route === 'profiles')  { state.lists.profiles.page = 1;  await fetchProfiles();  render(); }
      });

      [leadTypeWrap, hint, nameWrap, emailWrap, phoneWrap, regionWrap, langWrap,
       sectionHeader('Source Platform (how you found them)'),
       platWrap, usernameWrap, linkWrap, genreWrap, avgViewsWrap, followersWrap
      ].forEach(f => form.appendChild(f));

      form.appendChild(el('div', { class: 'flex justify-end gap-2 pt-3 mt-2 border-t border-slate-200' },
        el('button', { class: 'px-3 py-1.5 text-sm rounded-md border border-slate-200 bg-white hover:bg-slate-50', onClick: () => modal.close() }, 'Cancel'),
        submitBtn
      ));
      const modal = renderModal('Add Influencer Profile + Platform', form);
    }

    // ===============================================================
    // ADD PLATFORM FLOW (and auto-default campaign via DB trigger)
    // ===============================================================
    function openAddPlatformModal(profile) {
      const form = el('div', { class: 'space-y-3' });
      const fields = {};
      const mkField = (label, name, type = 'text', opts = {}) => {
        const inp = el('input', { type, name, class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' });
        fields[name] = inp;
        return el('label', { class: 'block' },
          el('span', { class: 'text-xs font-medium text-slate-600' }, label + (opts.required ? ' *' : '')),
          inp
        );
      };

      const platSel = el('select', { class: 'mt-1 w-full px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400' },
        el('option', { value: '' }, '— Select —'),
        ...['Instagram','Youtube','Facebook','Tiktok'].map(p => el('option', { value: p }, p))
      );
      fields.platform = platSel;

      form.appendChild(el('div', { class: 'text-xs px-2 py-1.5 bg-slate-100 rounded text-slate-700' }, `Profile: ${profile.name} (${profile.lead_type} lead)`));
      form.appendChild(el('label', { class: 'block' },
        el('span', { class: 'text-xs font-medium text-slate-600' }, 'Platform *'),
        platSel
      ));
      form.appendChild(mkField('Username *', 'username'));
      form.appendChild(mkField('Profile Link', 'link', 'url'));
      form.appendChild(mkField('Genre', 'genre'));
      form.appendChild(mkField('Avg Views (last 10 collabs)', 'avg_views', 'number'));
      form.appendChild(mkField('Followers', 'followers', 'number'));

      const submitBtn = el('button', { class: 'px-3 py-1.5 text-sm rounded-md btn-brand' }, 'Add Platform');
      submitBtn.addEventListener('click', async () => {
        const payload = {
          profile_id: profile.id,
          platform:   fields.platform.value,
          username:   fields.username.value.trim(),
          link:       fields.link.value.trim() || null,
          genre:      fields.genre.value.trim() || null,
          avg_views:  fields.avg_views.value ? parseInt(fields.avg_views.value) : null,
          followers:  fields.followers.value ? parseInt(fields.followers.value) : null,
          created_by: state.me.user_id,
        };
        if (!payload.platform) return toast('Pick a platform', 'error');
        if (!payload.username) return toast('Username is required', 'error');

        submitBtn.disabled = true; submitBtn.textContent = 'Saving…';
        const { error } = await supabase.from('platforms').insert(payload);
        submitBtn.disabled = false; submitBtn.textContent = 'Add Platform';
        if (error) return toast(error.message, 'error');

        modal.close();
        toast('Platform added — default campaign created (Scraping)', 'success');
        // refresh
        if (state.route === 'campaigns') { state.lists.campaigns.page = 1; await fetchCampaigns(); render(); }
        if (state.route === 'profiles')  { state.lists.profiles.page = 1;  await fetchProfiles();  render(); }
      });

      form.appendChild(el('div', { class: 'flex justify-end gap-2 pt-2' },
        el('button', { class: 'px-3 py-1.5 text-sm rounded-md border border-slate-200 bg-white hover:bg-slate-50', onClick: () => modal.close() }, 'Cancel'),
        submitBtn
      ));
      const modal = renderModal('Add Platform', form);
    }

    // ===============================================================
    // VIEWS — CAMPAIGNS LIST
    // ===============================================================
    function viewCampaigns() {
      const L = state.lists.campaigns;
      const fo = state.filterOptions;
      const totalPages = Math.max(1, Math.ceil(L.total / PAGE_SIZE));

      // Compute pipeline counts from filter_options' campaign data (or fall back to a quick query result if cached)
      const pipelineCounts = state.pipelineCounts || [];

      // Toolbar
      const searchInp = el('input', { type: 'search', placeholder: 'Search by campaign, influencer or @username…', value: L.search,
        class: 'flex-1 sm:flex-none sm:w-64 px-3 py-2 text-sm border border-slate-200 rounded-md focus:outline-none focus:border-slate-400 bg-white',
        oninput: debounce(e => { const v = e.target.value; if (v.length === 1) return; L.search = v; L.page = 1; refresh('campaigns'); }, 500)
      });

      const groupSel = el('select', { class: 'px-3 py-2 text-sm border border-slate-200 rounded-md bg-white',
        onchange: e => { L.filters.group_status = e.target.value || undefined; L.page = 1; refresh('campaigns'); }
      },
        el('option', { value: '' }, 'All stages'),
        ...(fo?.group_statuses || []).map(g => el('option', { value: g, selected: L.filters.group_status === g }, g))
      );

      const ownerSel = el('select', { class: 'px-3 py-2 text-sm border border-slate-200 rounded-md bg-white',
        onchange: e => { L.filters.owner_id = e.target.value || undefined; L.page = 1; refresh('campaigns'); }
      },
        el('option', { value: '' }, 'All owners'),
        ...(fo?.owners || []).map(o => el('option', { value: o.id, selected: L.filters.owner_id === o.id }, o.name || '—'))
      );

      const platSel = el('select', { class: 'px-3 py-2 text-sm border border-slate-200 rounded-md bg-white',
        onchange: e => { L.filters.platform = e.target.value || undefined; L.page = 1; refresh('campaigns'); }
      },
        el('option', { value: '' }, 'All platforms'),
        ...(fo?.platforms || []).map(p => el('option', { value: p, selected: L.filters.platform === p }, p))
      );

      const strip = pipelineStrip(pipelineCounts, (g) => {
        L.filters.group_status = L.filters.group_status === g ? undefined : g;
        L.page = 1; refresh('campaigns');
      });

      // Refined data table using CSS grid
      const cols = 'minmax(0,32px) minmax(0,2fr) minmax(0,1.6fr) minmax(0,1fr) minmax(0,1fr) minmax(0,0.9fr)';
      const headerRow = el('div', { class: 'hidden md:grid gap-3 items-center px-4 py-2.5 bg-slate-50 text-[10px] text-slate-500 uppercase tracking-wide font-medium border-b border-slate-200', style: `grid-template-columns:${cols};` },
        el('div', {}), el('div', {}, 'Influencer'), el('div', {}, 'Platform'),
        el('div', {}, 'Stage'), el('div', {}, 'Owner'),
        el('div', { class: 'text-right' }, 'Follow-up')
      );

      const renderRow = (c) => {
        const p  = c.platform?.profile;
        const pl = c.platform;
        const stageVariant = { 'Scraping':'slate','Screening':'info','Negotiation':'warning','Integration Planning':'purple','Documents':'indigo','Gone Live':'success','Post Gone Live':'livedark','Dropped':'rose' }[c.group_status] || 'slate';
        const overdue = c.next_followup_at && new Date(c.next_followup_at) < new Date() && !['Dropped','Post Gone Live'].includes(c.group_status);
        return el('div', { class: 'crm-row grid gap-3 items-center px-4 py-3 border-b border-slate-100 hover:bg-slate-50 cursor-pointer', style: `grid-template-columns:${cols};`,
          onClick: () => { window.location.hash = `#campaigns/${c.id}`; } },
          el('div', { class: 'crm-avatar' }, avatar(p?.name || '?', 28)),
          el('div', { class: 'min-w-0' },
            el('div', { class: 'text-[13px] font-medium text-slate-900 truncate' }, p?.name || '—'),
            el('div', { class: 'text-[11px] text-slate-400 truncate font-mono' }, `${c.name} · ${p?.lead_type || ''} lead`)
          ),
          el('div', { class: 'min-w-0' },
            el('div', { class: 'text-[13px] text-slate-700' }, pl?.platform || '—'),
            el('div', { class: 'text-[11px] text-slate-400 truncate' }, `@${pl?.username || ''}${pl?.followers ? ' · ' + Number(pl.followers).toLocaleString() : ''}`)
          ),
          el('div', {}, subtleBadge(c.group_status, stageVariant)),
          (() => {
            const poc = c.platform?.imported_poc;
            const realOwner = c.owner?.full_name || '—';
            if (poc && poc !== realOwner) {
              return el('div', { class: 'text-[12px] truncate min-w-0', title: `POC pending migration · currently owned by ${realOwner}` },
                el('span', { class: 'text-slate-700' }, poc),
                el('span', { class: 'text-[10px] text-amber-600 ml-1' }, '· pending')
              );
            }
            return el('div', { class: 'text-[12px] text-slate-600 truncate' }, realOwner);
          })(),
          el('div', { class: `text-[11px] text-right truncate ${overdue ? 'text-rose-600 font-medium' : 'text-slate-500'}` },
            c.next_followup_at ? fmtDateTime(c.next_followup_at) : '—'
          )
        );
      };

      const tableBody = L.items.length
        ? L.items.map(renderRow)
        : [el('div', { class: 'px-4 py-16 text-center text-sm text-slate-400' }, 'No campaigns match these filters. Click + New profile to begin.')];

      const table = el('div', { class: 'bg-white border border-slate-200 rounded-lg overflow-hidden' },
        headerRow,
        ...tableBody
      );

      // Pagination
      const pag = el('div', { class: 'flex items-center justify-between mt-3 text-[12px] text-slate-500' },
        el('span', {}, `Showing ${L.items.length} of ${L.total}`),
        el('div', { class: 'flex gap-1 items-center' },
          el('button', { class: 'px-2.5 py-1 border border-slate-200 rounded disabled:opacity-40 bg-white',
            disabled: L.page <= 1, onClick: () => { L.page--; refresh('campaigns'); } }, 'Prev'),
          el('span', { class: 'px-3 py-1' }, `Page ${L.page} / ${totalPages}`),
          el('button', { class: 'px-2.5 py-1 border border-slate-200 rounded disabled:opacity-40 bg-white',
            disabled: L.page >= totalPages, onClick: () => { L.page++; refresh('campaigns'); } }, 'Next')
        )
      );

      return el('div', {},
        pageHeader(
          'Influencer marketing',
          'Active campaigns',
          `Tracking ${L.total} campaigns across all platforms`,
          [
            el('button', { class: 'px-3 py-2 text-sm bg-white border border-slate-200 rounded-md hover:bg-slate-50 text-slate-700', onClick: exportCampaignsCSV }, '⬇ Export'),
            state.me?.role === 'admin' ? el('button', { class: 'px-3 py-2 text-sm bg-white border border-slate-200 rounded-md hover:bg-slate-50 text-slate-700', onClick: openImportCSVModal }, '⬆ Import') : null,
            el('button', { class: 'px-3 py-2 text-sm rounded-md btn-brand', onClick: openAddProfileModal }, '+ New profile')
          ]
        ),
        strip,
        // toolbar without the action buttons (moved to page header)
        el('div', { class: 'flex flex-wrap gap-2 items-center mb-4' }, searchInp, groupSel, ownerSel, platSel),
        table, pag
      );
    }

    // ===============================================================
    // CSV HELPERS
    // ===============================================================
    function toCSV(rows, columns) {
      const esc = (v) => {
        if (v == null) return '';
        const s = String(v);
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };
      const head = columns.map(c => esc(c.label)).join(',');
      const body = rows.map(r => columns.map(c => esc(typeof c.value === 'function' ? c.value(r) : r[c.value])).join(',')).join('\n');
      return head + '\n' + body;
    }
    function downloadCSV(filename, csv) {
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = el('a', { href: url, download: filename });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }
    function parseCSV(text) {
      // Simple CSV parser supporting quoted fields with commas
      const rows = [];
      let row = [], val = '', inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
          if (c === '"' && text[i+1] === '"') { val += '"'; i++; }
          else if (c === '"') inQ = false;
          else val += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { row.push(val); val = ''; }
          else if (c === '\n' || c === '\r') { if (c === '\r' && text[i+1] === '\n') i++; row.push(val); rows.push(row); row = []; val = ''; }
          else val += c;
        }
      }
      if (val !== '' || row.length) { row.push(val); rows.push(row); }
      return rows.filter(r => r.some(x => x !== ''));
    }

        const cellColor = (achieved, target) => {
          if (!target) return 'bg-slate-50 text-slate-400';

          if (pct >= 100) return 'bg-emerald-50 text-emerald-800';
          if (pct >= 50)  return 'bg-amber-50 text-amber-800';

          const dt = new Date(d);
          return `${dt.getDate()}/${dt.getMonth()+1}`;

            )
          )
        );
      })() : null;

      return el('div', {},

    const teamState = { members: [], pocs: [] };

      const [{ data, error }, { data: pocs }] = await Promise.all([
        supabase.from('team_members').select(`
          *, team_lead:team_lead_id ( full_name ), target:user_targets!user_targets_user_id_fkey ( daily_target )
        `).order('created_at', { ascending: true }),
        supabase.rpc('imported_poc_summary'),
      ]);
      if (error) { toast(error.message, 'error'); return; }
      teamState.members = data || [];
      teamState.pocs = pocs || [];
    }

      const m = teamState.members;
      const tls = m.filter(x => x.role === 'tl' && x.is_active);

        const { error } = await supabase.from('team_members').update({ role: newRole }).eq('user_id', uid);
        if (error) return toast(error.message, 'error');
        await fetchTeam(); render(); toast('Role updated', 'success');
      };
      const updateTL = async (uid, tlId) => {
        const { error } = await supabase.from('team_members').update({ team_lead_id: tlId || null }).eq('user_id', uid);
        if (error) return toast(error.message, 'error');
        await fetchTeam(); render(); toast('Team lead updated', 'success');
      };
      const updateActive = async (uid, isActive) => {
        const { error } = await supabase.from('team_members').update({ is_active: isActive }).eq('user_id', uid);
        if (error) return toast(error.message, 'error');
        await fetchTeam(); render(); toast('Status updated', 'success');
      };

      const updateTarget = async (uid, target) => {
        const t = parseInt(target) || 0;
        // upsert via merge on PK
        const { error } = await supabase.from('user_targets')
          .upsert({ user_id: uid, daily_target: t, updated_by: state.me.user_id }, { onConflict: 'user_id' });

        await fetchTeam();
        toast('Daily target updated', 'success');

      const openBulkReassign = (member) => {
        const otherMembers = m.filter(x => x.user_id !== member.user_id && x.is_active);

            .update({ owner_id: targetSel.value }, { count: 'exact' })
            .eq('owner_id', member.user_id)
            .not('group_status', 'in', '("Dropped","Post Gone Live")');

          el('label', { class: 'block' },
            el('span', { class: 'text-xs font-medium text-slate-600' }, 'Reassign to *'),

          el('p', { class: 'text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5' },

      };

      const migratePOC = async (poc, targetUserId, targetName) => {
        if (!targetUserId) return toast('Pick a team member', 'error');
        if (!confirm(`Migrate all records tagged "${poc}" to ${targetName}? This will transfer ownership of profiles, platforms, and campaigns.`)) return;
        const { data, error } = await supabase.rpc('migrate_poc', { poc_name: poc, target_user: targetUserId });
        if (error) return toast(error.message, 'error');

            el('tbody', {},

                  ...m.filter(x => x.is_active).map(x => el('option', { value: x.user_id, 'data-name': x.full_name || x.email }, x.full_name || x.email))

                return el('tr', { class: 'border-b border-slate-100' },

                  el('th', { class: 'px-3 py-2 text-left' }, 'Team Lead'),
                  el('th', { class: 'px-3 py-2 text-center' }, 'Active'),
                  el('th', { class: 'px-3 py-2 text-right' }, 'Daily Target'),
                  el('th', { class: 'px-3 py-2 text-right' }, 'Actions')
                )
              ),
              el('tbody', {},
                ...m.map(x => el('tr', { class: 'border-b border-slate-100' },
                  el('td', { class: 'px-3 py-2' }, x.full_name || '—'),
                  el('td', { class: 'px-3 py-2 text-xs text-slate-600' }, x.email),
                  el('td', { class: 'px-3 py-2' },

                      onchange: e => updateRole(x.user_id, e.target.value) },

    function openImportCSVModal() {
      const sampleHeaders = ['lead_type','name','email','phone','region','languages','platform','username','link','genre','avg_views','followers'];
      const fileInp = el('input', { type: 'file', accept: '.csv', class: 'w-full text-xs' });
      const summary = el('div', { class: 'text-xs text-slate-600 space-y-1' });
      const submitBtn = el('button', { class: 'px-3 py-1.5 text-sm rounded-md btn-brand', disabled: true }, 'Import');

      let parsed = null;
      fileInp.addEventListener('change', () => {
        const f = fileInp.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          const rows = parseCSV(r.result);
          if (!rows.length) { summary.innerHTML = 'Empty CSV'; return; }
          const headers = rows[0].map(h => h.trim().toLowerCase());
          const body = rows.slice(1);
          parsed = { headers, body };
          summary.innerHTML = `Found <b>${body.length}</b> rows. Columns: ${headers.join(', ')}`;
          submitBtn.disabled = false;
        };
        r.readAsText(f);
      });

      submitBtn.addEventListener('click', async () => {
        if (!parsed) return;
        submitBtn.disabled = true; submitBtn.textContent = 'Importing…';
        const { headers, body } = parsed;
        const idx = (n) => headers.indexOf(n);
        let ok = 0, fail = 0, errs = [];
        for (const row of body) {
          const get = (n) => idx(n) >= 0 ? row[idx(n)]?.trim() : '';
          const profilePayload = {
            lead_type: get('lead_type') || 'DM',
            name:      get('name'),
            email:     get('email') || null,
            phone:     get('phone') || null,
            region:    get('region') || null,
            languages: get('languages') ? get('languages').split(';').map(s => s.trim()).filter(Boolean) : null,
            created_by: state.me.user_id,
          };
          const platformPayload = {
            platform:   get('platform'),
            username:   get('username'),
            link:       get('link') || null,
            genre:      get('genre') || null,
            avg_views:  get('avg_views') ? parseInt(get('avg_views')) : null,
            followers:  get('followers') ? parseInt(get('followers')) : null,
            created_by: state.me.user_id,
          };
          if (!profilePayload.name || !platformPayload.platform || !platformPayload.username) {
            fail++; errs.push(`Missing required fields: ${profilePayload.name || '?'}`); continue;
          }
          const { data: p, error: pe } = await supabase.from('profiles').insert(profilePayload).select().single();
          if (pe) { fail++; errs.push(`${profilePayload.name}: ${pe.message}`); continue; }
          platformPayload.profile_id = p.id;
          const { error: ple } = await supabase.from('platforms').insert(platformPayload);
          if (ple) {
            await supabase.from('profiles').delete().eq('id', p.id);
            fail++; errs.push(`${profilePayload.name}: ${ple.message}`); continue;
          }
          ok++;
        }
        modal.close();
        toast(`Imported ${ok}, failed ${fail}`, fail ? 'error' : 'success');
        if (errs.length) console.warn('Import errors:', errs);
        if (state.route === 'campaigns') { await fetchCampaigns(); render(); }
      });

      const wrap = el('div', { class: 'space-y-3' },

    // ===============================================================
    // DETAIL: FETCHERS
    // ===============================================================
    async function fetchCampaignDetail(id) {
      state.detail.loading = true;
      const { data: c, error } = await supabase.from('campaigns').select(`
        *, platform:platforms!inner ( *, profile:profiles!inner ( * ) ),
        owner:team_members!campaigns_owner_id_fkey ( user_id, full_name, email )
      `).eq('id', id).single();
      if (error) { toast(error.message, 'error'); state.detail.loading = false; return; }

      const { data: acts } = await supabase.from('campaign_activities').select(`
        *, user:team_members!campaign_activities_user_id_fkey ( full_name )
      `).eq('campaign_id', id).order('created_at', { ascending: false });

      const { data: aud } = await supabase.from('campaign_audit').select(`
        *, user:team_members!campaign_audit_changed_by_fkey ( full_name )
      `).eq('campaign_id', id).order('changed_at', { ascending: false }).limit(50);

      state.detail.campaign = c;
      state.detail.activities = acts || [];
      state.detail.audit = aud || [];
      state.detail.loading = false;
    }

    async function fetchProfileDetail(id) {
      state.detail.loading = true;
      const { data: p, error } = await supabase.from('profiles').select(`
        *, owner:team_members!profiles_created_by_fkey ( full_name ),
        platforms ( *, owner:team_members!platforms_created_by_fkey ( full_name ),
          campaigns ( id, name, sub_status, group_status, owner_id, updated_at, created_at,
            owner:team_members!campaigns_owner_id_fkey ( full_name ) )
        )
      `).eq('id', id).single();
      if (error) { toast(error.message, 'error'); state.detail.loading = false; return; }
      state.detail.profile = p;
      state.detail.loading = false;
    }

    // ===============================================================
    // DETAIL HELPERS — sub_status options, file upload, etc.
    // ===============================================================
    function allowedSubStatuses(currentSub) {
      const map = state.filterOptions?.sub_statuses || [];
      const cur = map.find(m => m.sub === currentSub);
      if (!cur) return [];
      const curGroup = cur.group;
      // terminal lock: Post Gone Live / Dropped → no changes
      if (curGroup === 'Post Gone Live' || curGroup === 'Dropped') return [];
      // Forward sort_order OR any Dropped sub_status
      return map.filter(m => {
        const idx = map.indexOf(m);
        const curIdx = map.indexOf(cur);
        return m.group === 'Dropped' || idx >= curIdx;
      });
    }

    async function uploadCampaignFile(campaignId, kind, file) {
      const ext = file.name.split('.').pop();
      const path = `${campaignId}/${kind}-${Date.now()}.${ext}`;
      const { error } = await supabase.storage.from('campaign-files').upload(path, file, { upsert: true });
      if (error) { toast(error.message, 'error'); return null; }
      return path; // store the path, sign on view
    }

    async function signedUrl(path) {
      if (!path) return null;
      const { data } = await supabase.storage.from('campaign-files').createSignedUrl(path, 3600);
      return data?.signedUrl || null;
    }

    function canEditCampaign(c) {
      if (!c || !state.me) return false;
      if (state.me.role === 'admin') return true;
      if (c.owner_id === state.me.user_id) return true;
      // TL of owner
      // We don't have ownership chain client-side; let server RLS reject if not allowed.
      if (state.me.role === 'tl') return true;
      return false;
    }

        if (Object.keys(payload).length) {
          const { error: cErr } = await supabase.from('campaigns').update(payload).eq('id', c.id);
          if (cErr) { submitBtn.disabled = false; submitBtn.textContent = 'Save'; return toast(cErr.message, 'error'); }

          if (target && target !== c.sub_status) {
            await supabase.from('campaign_activities').insert({
              campaign_id: c.id, user_id: state.me.user_id, activity_type: 'stage_change',
              note: `${c.sub_status} → ${target}`,
              metadata: { from: c.sub_status, to: target },
            });
          }
        }

        modal.close();
        toast('Saved', 'success');
        await fetchCampaignDetail(c.id);
        render();
      });

      wrap.appendChild(el('div', { class: 'flex justify-end gap-2 pt-3 mt-3 border-t border-slate-200' },
        el('button', { class: 'px-3 py-1.5 text-sm rounded-md border border-slate-200 bg-white hover:bg-slate-50', onClick: () => modal.close() }, 'Cancel'),
        submitBtn
      ));

      const modal = renderModal('Log Activity', wrap);
    }

    // ===============================================================
    // ROUTING + MAIN RENDER
    // ===============================================================
    const ROUTES = {
      campaigns: { label: 'Campaigns', icon: '🎯', view: viewCampaigns, prefetch: fetchCampaigns },
      profiles:  { label: 'Profiles',  icon: '👤', view: viewProfiles,  prefetch: fetchProfiles },
      followups: { label: 'Follow-ups', icon: '⏰', view: viewFollowups, prefetch: fetchFollowups },
      dashboard: { label: 'Dashboard',  icon: '📊', view: viewDashboard, prefetch: fetchDashboard },
      reports:   { label: 'Reports',    icon: '📈', view: viewReports,   prefetch: fetchReports, adminOnly: true },
      team:      { label: 'Team',       icon: '👥', view: viewTeam,      prefetch: fetchTeam,    adminOnly: true },
    };

    function parseRoute() {
      const h = (window.location.hash || '#campaigns').slice(1);
      const [route, param] = h.split('/');
      state.route = ROUTES[route] ? route : 'campaigns';
      state.routeParam = param || null;
    }

    async function refresh(which) {
      const r = ROUTES[which];
      if (r?.prefetch) await r.prefetch();
      render();
    }

    function render() {
      const r = ROUTES[state.route];
      let body;
      if (state.routeParam && state.route === 'campaigns') {
        body = viewCampaignDetail();
      } else if (state.routeParam && state.route === 'profiles') {
        body = viewProfileDetail();
      } else {
        body = r.view();
      }

      const sidebar = el('aside', { id: 'sidebar', class: 'sidebar-mobile md:translate-x-0 fixed md:static z-30 inset-y-0 left-0 w-64 bg-white border-r border-slate-200 flex flex-col' },
        el('div', { class: 'px-6 py-5 border-b border-slate-200 flex items-center justify-between' },
          el('img', { src: 'data:image/png;base64,' + LOGO_B64, alt: 'BrightChamps', class: 'h-[100px] w-auto' }),

        el('div', { class: 'px-6 pt-4 pb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest' }, 'Influencer CRM'),
        el('nav', { class: 'flex-1 px-3 pb-3 space-y-0.5' },
          ...Object.entries(ROUTES)
            .filter(([k, r]) => !r.adminOnly || state.me?.role === 'admin')
            .map(([k, r]) => {
              const active = state.route === k;
              const badge = (k === 'followups' && state.overdueCount > 0)
                ? el('span', { class: `ml-auto text-[10px] font-bold px-1.5 py-0.5 rounded-full ${active ? 'bg-white/30 text-white' : 'bg-rose-500 text-white'}` }, String(state.overdueCount))
                : null;
              return el('a', {
                href: '#' + k,
                class: `flex items-center gap-3 px-3 py-2.5 text-sm rounded-lg transition-colors ${active ? 'text-white font-medium' : 'text-slate-700 hover:bg-slate-100'}`,
                style: active ? 'background-color: var(--brand);' : ''
              },
                el('span', { class: 'text-base' }, r.icon),
                el('span', {}, r.label),
                badge
              );
            })
        ),
        el('div', { class: 'px-4 py-3 border-t border-slate-200 bg-slate-50' },
          el('div', { class: 'flex items-center gap-2 mb-2' },
            el('div', { class: 'w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold', style: 'background-color: var(--brand);' },

              el('div', { class: 'text-xs font-medium text-slate-800 truncate' }, state.me?.full_name || state.session.user.email),

            )

      const header = el('header', { class: 'md:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between' },
        el('button', { class: 'text-slate-700', onClick: () => $('#sidebar').classList.add('open') }, '☰'),
        el('div', { class: 'text-sm font-semibold' }, ROUTES[state.route]?.label),
        el('div', { class: 'w-6' })
      );

      const main = el('main', { class: 'flex-1 overflow-y-auto scrollbar-thin bg-slate-50' },
        header,
        el('div', { class: 'p-4 md:p-8 max-w-screen-2xl mx-auto' },
          body
        )
      );

      $('#app').innerHTML = '';
      $('#app').appendChild(el('div', { class: 'min-h-screen flex' }, sidebar, main));
    }

    // ===============================================================
    // INIT
    // ===============================================================
    function debounce(fn, ms) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    async function boot() {
      // First-time OAuth redirect: Supabase sets the session via hash → exchange happens inside getSession()
      const ok = await ensureSession();
      if (!ok) return renderLogin();

      if (!state.me) {
        // team_members row should be auto-created via the auth trigger, but allow a beat
        await new Promise(r => setTimeout(r, 500));
        state.me = await loadMe();
      }
      if (!state.me) {
        $('#app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-sm text-slate-600">Your account isn't provisioned yet. Ask an admin to add you to team_members.</div>`;
        return;
      }

      await loadFilterOptions();
      await refreshOverdueCount();
      parseRoute();
      if (state.routeParam && state.route === 'campaigns') await fetchCampaignDetail(state.routeParam);
      else if (state.routeParam && state.route === 'profiles') await fetchProfileDetail(state.routeParam);
      else await ROUTES[state.route].prefetch?.();
      render();

      window.addEventListener('hashchange', async () => {
        parseRoute();
        state.detail = { campaign: null, profile: null, activities: [], audit: [], loading: false };
        if (state.routeParam && state.route === 'campaigns') {
          state.detail.loading = true; render();
          await fetchCampaignDetail(state.routeParam);
        } else if (state.routeParam && state.route === 'profiles') {
          state.detail.loading = true; render();
          await fetchProfileDetail(state.routeParam);
        } else {
          const r = ROUTES[state.route];
          if (r?.prefetch) await r.prefetch();
        }
        await refreshOverdueCount();
        render();
        $('#sidebar')?.classList.remove('open');
      });
    }

    function renderLogin() {
      $('#app').innerHTML = '';
      $('#app').appendChild(
        el('div', { class: 'min-h-screen flex items-center justify-center p-4 bg-slate-50' },
          el('div', { class: 'bg-white border border-slate-200 rounded-xl shadow-sm p-8 w-full max-w-sm text-center' },
            el('img', { src: 'data:image/png;base64,' + LOGO_B64, alt: 'BrightChamps', class: 'h-[88px] w-auto mx-auto mb-4' }),
            el('div', { class: 'text-lg font-semibold text-slate-900 mb-1' }, 'Influencer CRM'),
            el('div', { class: 'text-sm text-slate-500 mb-6' }, 'Sign in to continue'),
            el('button', {
              class: 'w-full px-4 py-2.5 btn-brand text-sm font-medium rounded-md flex items-center justify-center gap-2',
              onClick: signIn
            }, '🔐  Sign in with Google'),
            el('p', { class: 'text-[11px] text-slate-400 mt-4' }, `Restricted to @${ALLOWED_DOMAIN} accounts`)
          )
        )
      );
    }

    boot().catch(e => { console.error(e); $('#app').innerHTML = `<pre class="p-6 text-xs text-rose-700">${escape(e.stack || e.message)}</pre>`; });
  </script>
</body>
</html>
