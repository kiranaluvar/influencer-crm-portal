  <meta name="theme-color" content="#0f172a" />
  <title>Influencer CRM — BrightChamps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --brand:      #4060f0;
      --brand-dark: #3050e0;
      --brand-soft: #eaf0ff;
      --bc-yellow:  #f0d000;
      --bc-orange:  #f08000;
      --bc-green:   #40d060;
      --bc-cyan:    #40c0f0;
      --bc-red:     #f04040;
    }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .btn-brand { background-color: var(--brand); color: white; }
    .btn-brand:hover { background-color: var(--brand-dark); }
    .btn-brand:disabled { opacity: 0.5; cursor: not-allowed; }
    .text-brand { color: var(--brand); }
    .text-brand:hover { color: var(--brand-dark); }
    .border-brand { border-color: var(--brand); }
    .ring-brand:focus { box-shadow: 0 0 0 2px var(--brand); outline: none; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .modal-backdrop { background: rgba(15,23,42,0.5); backdrop-filter: blur(2px); }
    .fade-in { animation: fade 0.15s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes confetti-fall {
      0%   { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0.9; }
    }
    .confetti-piece { position: fixed; top: 0; z-index: 9999; pointer-events: none; will-change: transform; animation: confetti-fall linear forwards; }
    @media (max-width: 768px) {
      .sidebar-mobile { transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar-mobile.open { transform: translateX(0); }
    }
    /* Heatmap cell colors */
    .heatmap-cell { color: #fff; font-size: 11px; padding: 4px 6px; text-align: center; min-width: 32px; }
    /* Responsive table rows: stack vertically on mobile */
    @media (max-width: 767px) {
      .crm-row {
        grid-template-columns: 1fr !important;
        row-gap: 6px;
        padding: 14px 16px;
      }
      .crm-row > * { min-width: 0; }
      .crm-row .crm-avatar { display: none; }
      .crm-row-cell-secondary { color: #64748b; font-size: 12px; }
    }
  </style>
</head>

    const $  = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const el = (tag, attrs = {}, ...children) => {
      const n = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => {
        if (k === 'class') n.className = v;
        else if (k === 'html') n.innerHTML = v;
        else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), v);
        else if (v !== false && v != null) n.setAttribute(k, v);
      });
      children.flat().forEach(c => {
        if (c == null || c === false) return;
        n.appendChild(c.nodeType ? c : document.createTextNode(c));
      });
      return n;
    };

    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
    const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
    const relativeTime = (d) => {
      if (!d) return '—';
      const dt = new Date(d);
      const now = new Date();
      const startOfDay = (x) => { const y = new Date(x); y.setHours(0,0,0,0); return y; };
      const diffDays = Math.round((startOfDay(now) - startOfDay(dt)) / 86400000);
      const time = dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
      if (diffDays === 0) return `Today ${time}`;
      if (diffDays === 1) return 'Yesterday';
      if (diffDays > 1 && diffDays < 7) return `${diffDays} days ago`;
      return fmtDate(d);
    };
    const escape = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

      { bg: '#FEE2E2', fg: '#B91C1C' }, // red

      { bg: '#DCFCE7', fg: '#166534' }, // green

    const avatarColor = (name) => {
      const s = String(name || '?');
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
      return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
    };
    function avatar(name, size = 28) {

    function subtleBadge(text, variant = 'slate') {
      const map = {
        slate:   'bg-stone-100 text-stone-700',
        info:    'bg-blue-50 text-blue-700',
        warning: 'bg-amber-50 text-amber-800',
        success: 'bg-emerald-50 text-emerald-700',

        indigo:  'bg-indigo-50 text-indigo-700',
        rose:    'bg-rose-50 text-rose-700',
      };
      return el('span', { class: `inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium ${map[variant] || map.slate}` }, text);
    }

    function kpiTile(label, value, valueColor = 'text-stone-900') {
      return el('div', { class: 'bg-stone-50 rounded-lg px-3 py-2.5' },
        el('div', { class: 'text-[10px] text-stone-500 uppercase tracking-wide font-medium' }, label),
        el('div', { class: `text-[18px] font-semibold mt-0.5 ${valueColor}` }, String(value))
      );
    }

    // Reusable multi-select filter — checkbox popover instead of a native single-select.
    // Standard component for ALL filter dropdowns going forward (people always need to pick more than one).
    // options: array of strings, or array of {value, label}. onChange receives the full array of selected values.
    function multiSelectFilter(label, options, selected, onChange) {
      const normOpts = options.map(o => typeof o === 'string' ? { value: o, label: o } : o);
      const sel = new Set(selected || []);
      const btn = el('button', { type: 'button', class: 'px-3 py-2 text-sm border border-stone-200 rounded-lg bg-white hover:bg-stone-50 flex items-center gap-1.5 whitespace-nowrap' });
      const caret = el('span', { class: 'text-stone-400 text-[10px]' }, '▾');
      const btnLabel = el('span', {});
      btn.appendChild(btnLabel); btn.appendChild(caret);
      const renderLabel = () => { btnLabel.textContent = sel.size ? `${label} (${sel.size})` : `All ${label.toLowerCase()}`; };
      renderLabel();

      const panel = el('div', { class: 'ms-panel absolute z-20 mt-1 bg-white border border-stone-200 rounded-lg shadow-lg p-1.5 max-h-64 overflow-y-auto hidden', style: 'min-width:200px;' });
      normOpts.forEach(o => {
        const cb = el('input', { type: 'checkbox', checked: sel.has(o.value), class: 'rounded border-stone-300 text-blue-600 focus:ring-blue-500' });
        cb.addEventListener('change', () => {
          if (cb.checked) sel.add(o.value); else sel.delete(o.value);
          renderLabel();
          onChange(Array.from(sel));
        });
        panel.appendChild(el('label', { class: 'flex items-center gap-2 px-2 py-1.5 text-sm hover:bg-stone-50 rounded-lg cursor-pointer' }, cb, o.label));
      });

      const wrap = el('div', { class: 'relative inline-block' }, btn, panel);
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        $$('.ms-panel').forEach(p => { if (p !== panel) p.classList.add('hidden'); });
        panel.classList.toggle('hidden');
      });
      document.addEventListener('click', (e) => { if (!wrap.contains(e.target)) panel.classList.add('hidden'); });
      return wrap;
    }

    function pipelineStrip(counts, onClick) {
      // counts: array of { group, count } in canonical order
      const order = ['Scraping','Screening','Negotiation','Documents','Integration Planning','Gone Live','Post Gone Live','Dropped'];
      const variants = { 'Scraping':'slate', 'Screening':'info', 'Negotiation':'warning', 'Integration Planning':'purple', 'Documents':'indigo', 'Gone Live':'success', 'Post Gone Live':'livedark', 'Dropped':'rose' };
      const labels =   { 'Scraping':'Scraping', 'Screening':'Screening', 'Negotiation':'Negotiation', 'Integration Planning':'Integration Planning', 'Documents':'Documents', 'Gone Live':'Gone Live', 'Post Gone Live':'Post Live', 'Dropped':'Dropped' };
      const lookup = Object.fromEntries((counts || []).map(c => [c.group, c.count]));
      return el('div', { class: 'grid grid-cols-4 sm:grid-cols-8 gap-1.5 mb-5' },
        ...order.map(g => {
          const v = variants[g];
          const cls = subtleBadge('', v).className; // reuse color mapping
          return el('button', {
            class: `text-left px-3 py-2 rounded-lg ${cls.replace('inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium ','')} hover:ring-1 hover:ring-stone-300 transition`,
            onClick: () => onClick && onClick(g),
          },
            el('div', { class: 'text-[10px] uppercase tracking-wide font-medium opacity-80' }, labels[g]),
            el('div', { class: 'text-[16px] font-semibold mt-0.5' }, String(lookup[g] || 0))
          );
        })
      );
    }

    const toast = (msg, type = 'info') => {
      const colors = { info: 'bg-stone-900', success: 'bg-emerald-600', error: 'bg-rose-600' };
      const t = el('div', { class: `fixed bottom-6 left-1/2 -translate-x-1/2 ${colors[type]} text-white text-sm px-4 py-2 rounded-xl shadow-lg z-50 fade-in` }, msg);
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    };

    // Confetti burst for the "campaign just went Gone Live" moment — pure CSS/JS, no external library.
    function celebrateGoneLive() {
      const colors = ['#4060f0', '#f0d000', '#f08000', '#40d060', '#40c0f0', '#f04040'];
      const count = 90;
      for (let i = 0; i < count; i++) {
        const size = 6 + Math.random() * 6;
        const isCircle = Math.random() > 0.5;
        const piece = el('div', {
          class: 'confetti-piece',
          style: `
            left:${Math.random() * 100}vw;
            width:${size}px; height:${size * (isCircle ? 1 : 0.5)}px;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            border-radius:${isCircle ? '50%' : '2px'};
            --drift:${(Math.random() - 0.5) * 300}px;
            --spin:${(Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 720)}deg;
            animation-duration:${2.5 + Math.random() * 1.5}s;
            animation-delay:${Math.random() * 0.4}s;
          `
        });
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4500);
      }
    }

    // ===============================================================
    // AUTH
    // ===============================================================
    async function signIn() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          queryParams: { hd: ALLOWED_DOMAIN, prompt: 'select_account' },
          redirectTo: window.location.origin + window.location.pathname,
        },
      });
      if (error) toast(error.message, 'error');
    }

    async function signOut() {
      await supabase.auth.signOut();
      window.location.reload();
    }

    async function loadMe() {
      const { data, error } = await supabase.from('team_members')
        .select('*').eq('user_id', state.session.user.id).maybeSingle();
      if (error) { console.error(error); return null; }
      return data;
    }

    async function ensureSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return false;
      // Domain check
      const email = session.user.email || '';
      if (!email.toLowerCase().endsWith('@' + ALLOWED_DOMAIN)) {
        await supabase.auth.signOut();
        toast(`Access restricted to @${ALLOWED_DOMAIN} accounts`, 'error');
        return false;
      }
      state.session = session;
      state.me = await loadMe();
      return true;
    }

    // ===============================================================
    // DATA: FILTER OPTIONS (cached)
    // ===============================================================
    async function loadFilterOptions() {
      if (state.filterOptions) return state.filterOptions;
      const { data, error } = await supabase.rpc('filter_options');
      if (error) { console.error(error); return null; }
      state.filterOptions = data;
      return data;
    }

    async function refreshOverdueCount() {
      const { count } = await supabase.from('campaigns').select('id', { count: 'exact', head: true })
        .eq('owner_id', state.me.user_id)
        .lt('next_followup_at', new Date().toISOString())
        .not('group_status', 'in', '("Dropped","Post Gone Live")');
      state.overdueCount = count || 0;
    }

    // ===============================================================
    // DATA: CAMPAIGNS LIST
    // ===============================================================
    async function fetchCampaigns() {
      const L = state.lists.campaigns;
      const from = (L.page - 1) * PAGE_SIZE;
      const to   = from + PAGE_SIZE - 1;

      const sel = `
        id, name, sub_status, group_status, owner_id, next_followup_at, updated_at, created_at,
        platform:platforms!inner ( id, platform, username, followers, imported_poc, profile:profiles!inner ( id, name, lead_type ) ),
        owner:team_members!campaigns_owner_id_fkey ( full_name )
      `;

      const applyFilters = (q) => {
        if ((L.filters.group_status || []).length) q = q.in('group_status', L.filters.group_status);
        if ((L.filters.sub_status || []).length)   q = q.in('sub_status', L.filters.sub_status);
        if ((L.filters.owner_id || []).length)     q = q.in('owner_id', L.filters.owner_id);
        if ((L.filters.platform || []).length)     q = q.in('platforms.platform', L.filters.platform);
        if (L.filters.date_from)    q = q.gte('created_at', L.filters.date_from);
        if (L.filters.date_to)      q = q.lte('created_at', L.filters.date_to + 'T23:59:59');
        return q;
      };

      if (L.search) {
        // Multi-query merge: search by campaign name, platform username, influencer name in parallel
        const s = L.search;
        const [a, b, c] = await Promise.all([
          applyFilters(supabase.from('campaigns').select(sel)).ilike('name', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
          applyFilters(supabase.from('campaigns').select(sel)).ilike('platforms.username', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
          applyFilters(supabase.from('campaigns').select(sel)).ilike('platforms.profiles.name', `%${s}%`).order('updated_at', { ascending: false }).limit(200),
        ]);
        if (a.error || b.error || c.error) {
          const err = a.error || b.error || c.error;
          console.error(err); toast(err.message, 'error'); return;
        }
        const merged = new Map();
        [a.data, b.data, c.data].forEach(arr => (arr || []).forEach(item => merged.set(item.id, item)));
        const all = Array.from(merged.values()).sort((x, y) => new Date(y.updated_at) - new Date(x.updated_at));
        L.total = all.length;
        L.items = all.slice(from, from + PAGE_SIZE);
      } else {
        let q = applyFilters(supabase.from('campaigns').select(sel, { count: 'exact' }))
          .order('updated_at', { ascending: false }).range(from, to);
        const { data, error, count } = await q;
        if (error) { console.error(error); toast(error.message, 'error'); return; }
        L.items = data || [];
        L.total = count || 0;
      }

      // Pipeline counts for the strip
      const { data: pc } = await supabase.rpc('dashboard_data');
      state.pipelineCounts = pc?.pipeline || [];
    }

    // ===============================================================
    // DATA: PROFILES LIST
    // ===============================================================
    async function fetchProfiles() {
      const L = state.lists.profiles;
      const from = (L.page - 1) * PAGE_SIZE;
      const to   = from + PAGE_SIZE - 1;

      // Use an inner join on platforms only when filtering by platform, so profiles with
      // zero platforms still show up normally the rest of the time.
      const platformJoin = (L.filters.platform || []).length ? 'platforms!inner' : 'platforms';
      let q = supabase.from('profiles').select(`
        id, name, email, phone, region, lead_type, created_at,
        owner:team_members!profiles_created_by_fkey ( full_name ),
        ${platformJoin} ( id, platform, username )
      `, { count: 'exact' });

      if (L.search) q = q.or(`name.ilike.%${L.search}%,email.ilike.%${L.search}%,phone.ilike.%${L.search}%`);
      if ((L.filters.lead_type || []).length) q = q.in('lead_type', L.filters.lead_type);
      if ((L.filters.created_by || []).length) q = q.in('created_by', L.filters.created_by);
      if ((L.filters.region || []).length) q = q.in('region', L.filters.region);
      if ((L.filters.platform || []).length) q = q.in('platforms.platform', L.filters.platform);

      q = q.order('created_at', { ascending: false }).range(from, to);

      const { data, error, count } = await q;
      if (error) { console.error(error); toast(error.message, 'error'); return; }
      L.items = data || [];
      L.total = count || 0;
    }

    function renderModal(title, content) {
      const backdrop = el('div', { class: 'fixed inset-0 z-40 modal-backdrop flex items-center justify-center p-4 fade-in' });
      const modal = el('div', { class: 'bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col' },

        el('div', { class: 'p-5 overflow-y-auto scrollbar-thin' }, content)
      );
      backdrop.appendChild(modal);
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });

    // ===============================================================
    // VIEWS — CAMPAIGNS LIST
    // ===============================================================
    function viewCampaigns() {
      const L = state.lists.campaigns;
      const fo = state.filterOptions;
      const totalPages = Math.max(1, Math.ceil(L.total / PAGE_SIZE));

      // Compute pipeline counts from filter_options' campaign data (or fall back to a quick query result if cached)
      const pipelineCounts = state.pipelineCounts || [];

      // Toolbar
      const searchInp = el('input', { type: 'search', placeholder: 'Search by campaign, influencer or @username…', value: L.search,
        class: 'flex-1 sm:flex-none sm:w-64 px-3 py-2 text-sm border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400 bg-white',
        oninput: debounce(e => { const v = e.target.value; if (v.length === 1) return; L.search = v; L.page = 1; refresh('campaigns'); }, 500)
      });

      const groupSel = multiSelectFilter('Stages', fo?.group_statuses || [], L.filters.group_status, (vals) => {
        L.filters.group_status = vals; L.page = 1; refresh('campaigns');
      });

      const ownerSel = multiSelectFilter('Owners', (fo?.owners || []).map(o => ({ value: o.id, label: o.name || '—' })), L.filters.owner_id, (vals) => {
        L.filters.owner_id = vals; L.page = 1; refresh('campaigns');
      });

      const platSel = multiSelectFilter('Platforms', fo?.platforms || [], L.filters.platform, (vals) => {
        L.filters.platform = vals; L.page = 1; refresh('campaigns');
      });

      const strip = pipelineStrip(pipelineCounts, (g) => {
        const cur = L.filters.group_status || [];
        L.filters.group_status = cur.includes(g) ? cur.filter(x => x !== g) : [...cur, g];
        L.page = 1; refresh('campaigns');
      });

      // Refined data table using CSS grid
      const cols = 'minmax(0,32px) minmax(0,2fr) minmax(0,1.6fr) minmax(0,1fr) minmax(0,1fr) minmax(0,0.9fr)';
      const headerRow = el('div', { class: 'hidden md:grid gap-3 items-center px-4 py-2.5 bg-stone-50 text-[10px] text-stone-500 uppercase tracking-wide font-medium border-b border-stone-200', style: `grid-template-columns:${cols};` },
        el('div', {}), el('div', {}, 'Influencer'), el('div', {}, 'Platform'),
        el('div', {}, 'Stage'), el('div', {}, 'Owner'),
        el('div', { class: 'text-right' }, 'Follow-up')
      );

      const renderRow = (c) => {
        const p  = c.platform?.profile;
        const pl = c.platform;
        const stageVariant = { 'Scraping':'slate','Screening':'info','Negotiation':'warning','Integration Planning':'purple','Documents':'indigo','Gone Live':'success','Post Gone Live':'livedark','Dropped':'rose' }[c.group_status] || 'slate';
        const overdue = c.next_followup_at && new Date(c.next_followup_at) < new Date() && !['Dropped','Post Gone Live'].includes(c.group_status);
        return el('div', { class: 'crm-row grid gap-3 items-center px-4 py-3 border-b border-stone-100 hover:bg-stone-50 cursor-pointer', style: `grid-template-columns:${cols};`,
          onClick: () => { window.location.hash = `#campaigns/${c.id}`; } },
          el('div', { class: 'crm-avatar' }, avatar(p?.name || '?', 28)),
          el('div', { class: 'min-w-0' },
            el('div', { class: 'text-[13px] font-medium text-stone-900 truncate' }, p?.name || '—'),
            el('div', { class: 'text-[11px] text-stone-400 truncate font-mono' }, `${c.name} · ${p?.lead_type || ''} lead`)
          ),
          el('div', { class: 'min-w-0' },
            el('div', { class: 'text-[13px] text-stone-700' }, pl?.platform || '—'),
            el('div', { class: 'text-[11px] text-stone-400 truncate' }, `@${pl?.username || ''}${pl?.followers ? ' · ' + Number(pl.followers).toLocaleString() : ''}`)
          ),
          el('div', {}, subtleBadge(c.group_status, stageVariant)),
          (() => {
            const poc = c.platform?.imported_poc;
            const realOwner = c.owner?.full_name || '—';
            if (poc && !pocIsResolved(poc, realOwner)) {
              return el('div', { class: 'text-[12px] truncate min-w-0', title: `POC pending migration · currently owned by ${realOwner}` },
                el('span', { class: 'text-stone-700' }, poc),
                el('span', { class: 'text-[10px] text-amber-600 ml-1' }, '· pending')
              );
            }
            return el('div', { class: 'text-[12px] text-stone-600 truncate' }, realOwner);
          })(),
          el('div', { class: `text-[11px] text-right truncate ${overdue ? 'text-rose-600 font-medium' : 'text-stone-500'}` },
            c.next_followup_at ? fmtDateTime(c.next_followup_at) : '—'
          )
        );
      };

      const tableBody = L.items.length
        ? L.items.map(renderRow)
        : [el('div', { class: 'px-4 py-16 text-center text-sm text-stone-400' }, 'No campaigns match these filters. Click + New profile to begin.')];

      const table = el('div', { class: 'bg-white border border-stone-200 rounded-xl overflow-hidden' },
        headerRow,
        ...tableBody

    // ===============================================================
    // CSV HELPERS
    // ===============================================================
    function toCSV(rows, columns) {
      const esc = (v) => {
        if (v == null) return '';
        const s = String(v);
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };
      const head = columns.map(c => esc(c.label)).join(',');
      const body = rows.map(r => columns.map(c => esc(typeof c.value === 'function' ? c.value(r) : r[c.value])).join(',')).join('\n');
      return head + '\n' + body;
    }
    function downloadCSV(filename, csv) {
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = el('a', { href: url, download: filename });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }
    function parseCSV(text) {
      // Simple CSV parser supporting quoted fields with commas
      const rows = [];
      let row = [], val = '', inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
          if (c === '"' && text[i+1] === '"') { val += '"'; i++; }
          else if (c === '"') inQ = false;
          else val += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { row.push(val); val = ''; }
          else if (c === '\n' || c === '\r') { if (c === '\r' && text[i+1] === '\n') i++; row.push(val); rows.push(row); row = []; val = ''; }
          else val += c;
        }
      }
      if (val !== '' || row.length) { row.push(val); rows.push(row); }
      return rows.filter(r => r.some(x => x !== ''));
    }

    // ===============================================================
    // REPORTS (admin)
    // ===============================================================
    const reportsState = { from: null, to: null, data: null, targets: null };
    async function fetchReports() {
      if (!reportsState.from) {
        const t = new Date(); const f = new Date(t); f.setDate(f.getDate() - 29);
        reportsState.to = t.toISOString().slice(0, 10);
        reportsState.from = f.toISOString().slice(0, 10);
      }
      const rangeStart = reportsState.from;
      const rangeEnd = reportsState.to + 'T23:59:59';
      const [{ data: d, error: e1 }, { data: tg, error: e2 }, { data: rawScouts, error: e3 }, { data: rawFollowups, error: e4 }, { data: admins, error: e5 }, { data: rawGoneLive, error: e6 }] = await Promise.all([
        supabase.rpc('reports_data', { d_from: reportsState.from, d_to: reportsState.to }),
        supabase.rpc('reachout_target_report', { d_from: reportsState.from, d_to: reportsState.to }),
        supabase.from('platforms').select('created_at').gte('created_at', rangeStart).lte('created_at', rangeEnd),
        supabase.from('campaign_activities').select('created_at').gte('created_at', rangeStart).lte('created_at', rangeEnd),
        supabase.from('team_members').select('user_id').eq('role', 'admin'),
        supabase.from('campaigns').select('gone_live_date, owner:team_members!campaigns_owner_id_fkey ( full_name )')
          .not('gone_live_date', 'is', null).gte('gone_live_date', reportsState.from).lte('gone_live_date', reportsState.to),
      ]);
      if (e1) { toast(e1.message, 'error'); return; }
      if (e2) { toast(e2.message, 'error'); }
      reportsState.data = d;
      // Admins don't carry a reachout target — exclude them from the Target vs Achieved report entirely
      const adminIds = new Set((admins || []).map(a => a.user_id));
      reportsState.targets = tg ? { ...tg, summary: (tg.summary || []).filter(u => !adminIds.has(u.user_id)) } : tg;
      // The RPC's own hourly bucketing has a known bug (correlated subquery mismatches hours across
      // different days), so recompute hourly counts here directly from raw rows instead of trusting d.hourly.
      if (!e3 && !e4) {
        const newByHr = Array(24).fill(0), fuByHr = Array(24).fill(0);
        (rawScouts || []).forEach(r => newByHr[new Date(r.created_at).getHours()]++);
        (rawFollowups || []).forEach(r => fuByHr[new Date(r.created_at).getHours()]++);
        reportsState.hourly = Array.from({ length: 24 }, (_, hr) => ({ hr, new_count: newByHr[hr], fu_count: fuByHr[hr] }));
      } else {
        reportsState.hourly = d?.hourly || [];
      }
      // Gone Live count, day-wise, stacked by owner
      if (!e6) {
        const byDayOwner = {};
        const owners = new Set();
        (rawGoneLive || []).forEach(r => {
          const day = r.gone_live_date;
          const owner = r.owner?.full_name || 'Unassigned';
          owners.add(owner);
          byDayOwner[day] = byDayOwner[day] || {};
          byDayOwner[day][owner] = (byDayOwner[day][owner] || 0) + 1;
        });
        const days = Object.keys(byDayOwner).sort();
        reportsState.goneLive = { days, owners: Array.from(owners).sort(), byDayOwner };
      } else {
        reportsState.goneLive = { days: [], owners: [], byDayOwner: {} };
      }
    }

    function openImportCSVModal() {
      const sampleHeaders = ['lead_type','name','email','phone','region','languages','platform','username','link','genre','avg_views','followers'];
      const fileInp = el('input', { type: 'file', accept: '.csv', class: 'w-full text-xs' });
      const summary = el('div', { class: 'text-xs text-stone-600 space-y-1' });
      const submitBtn = el('button', { class: 'px-3 py-1.5 text-sm rounded-lg btn-brand', disabled: true }, 'Import');

      let parsed = null;
      fileInp.addEventListener('change', () => {
        const f = fileInp.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          const rows = parseCSV(r.result);
          if (!rows.length) { summary.innerHTML = 'Empty CSV'; return; }
          const headers = rows[0].map(h => h.trim().toLowerCase());
          const body = rows.slice(1);
          parsed = { headers, body };
          summary.innerHTML = `Found <b>${body.length}</b> rows. Columns: ${headers.join(', ')}`;
          submitBtn.disabled = false;
        };
        r.readAsText(f);
      });

      submitBtn.addEventListener('click', async () => {
        if (!parsed) return;
        submitBtn.disabled = true; submitBtn.textContent = 'Importing…';
        const { headers, body } = parsed;
        const idx = (n) => headers.indexOf(n);
        let ok = 0, fail = 0, errs = [];
        for (const row of body) {
          const get = (n) => idx(n) >= 0 ? row[idx(n)]?.trim() : '';
          const profilePayload = {
            lead_type: get('lead_type') || 'DM',
            name:      get('name'),
            email:     get('email') || null,
            phone:     get('phone') || null,
            region:    get('region') || null,
            languages: get('languages') ? get('languages').split(';').map(s => s.trim()).filter(Boolean) : null,
            created_by: state.me.user_id,
          };
          const platformPayload = {
            platform:   get('platform'),
            username:   get('username'),
            link:       get('link') || null,
            genre:      get('genre') || null,
            avg_views:  get('avg_views') ? parseInt(get('avg_views')) : null,
            followers:  get('followers') ? parseInt(get('followers')) : null,
            created_by: state.me.user_id,
          };
          if (!profilePayload.name || !platformPayload.platform || !platformPayload.username) {
            fail++; errs.push(`Missing required fields: ${profilePayload.name || '?'}`); continue;
          }
          const { data: p, error: pe } = await supabase.from('profiles').insert(profilePayload).select().single();
          if (pe) { fail++; errs.push(`${profilePayload.name}: ${pe.message}`); continue; }
          platformPayload.profile_id = p.id;
          const { error: ple } = await supabase.from('platforms').insert(platformPayload);
          if (ple) {
            await supabase.from('profiles').delete().eq('id', p.id);
            fail++; errs.push(`${profilePayload.name}: ${ple.message}`); continue;
          }
          ok++;
        }
        modal.close();
        toast(`Imported ${ok}, failed ${fail}`, fail ? 'error' : 'success');
        if (errs.length) console.warn('Import errors:', errs);
        if (state.route === 'campaigns') { await fetchCampaigns(); render(); }
      });

      const wrap = el('div', { class: 'space-y-3' },
        el('p', { class: 'text-xs text-stone-600' }, 'CSV columns expected (case-insensitive). Languages can be semicolon-separated. Required: name, platform, username.'),
        el('p', { class: 'text-[11px] font-mono bg-stone-100 px-2 py-1 rounded break-all' }, sampleHeaders.join(',')),
        fileInp,
        summary,
        el('div', { class: 'flex justify-end gap-2 pt-2' },
          el('button', { class: 'px-3 py-1.5 text-sm rounded-lg border border-stone-200 bg-white hover:bg-stone-50', onClick: () => modal.close() }, 'Cancel'),
          submitBtn
        )
      );
      const modal = renderModal('Import CSV', wrap);
    }

    // ===============================================================
    // DETAIL HELPERS — sub_status options, file upload, etc.
    // ===============================================================
    function allowedSubStatuses(currentSub) {
      const map = state.filterOptions?.sub_statuses || [];
      const cur = map.find(m => m.sub === currentSub);
      if (!cur) return [];
      const curGroup = cur.group;
      // terminal lock: Post Gone Live only. Dropped is reversible — a campaign can be brought
      // back into the active pipeline from Dropped (e.g. AppSheet/reconsideration cases).
      if (curGroup === 'Post Gone Live') return [];
      if (curGroup === 'Dropped') return map; // from Dropped, any stage is selectable
      // Forward sort_order OR any Dropped sub_status
      return map.filter(m => {
        const idx = map.indexOf(m);
        const curIdx = map.indexOf(cur);
        return m.group === 'Dropped' || idx >= curIdx;
      });
    }

    // TEMPORARY: backward movement is unlocked for now (agents need to go back to e.g. "agreement done"
    // to attach docs even after a campaign moved further along). Flip this back to true to re-lock it.
    const ENFORCE_BACKWARD_LOCK = false;

    // Returns ALL stages/sub-statuses (grouped, in pipeline order) with a `locked` flag per
    // sub-status — locked = true when moving there would be backward movement (not allowed).
    // Dropped is never locked. Used so dropdowns show the full picture instead of hiding stages.
    function allSubStatusesWithLock(currentSub) {
      const map = state.filterOptions?.sub_statuses || [];
      const cur = map.find(m => m.sub === currentSub);
      const curIdx = cur ? map.indexOf(cur) : -1;
      const order = [];
      const byGroup = {};
      map.forEach(m => {
        if (!byGroup[m.group]) { byGroup[m.group] = []; order.push(m.group); }
        byGroup[m.group].push(m.sub);
      });
      return order.map(group => ({
        group,
        subs: byGroup[group].map(sub => {
          const idx = map.findIndex(m => m.sub === sub && m.group === group);
          const locked = ENFORCE_BACKWARD_LOCK && group !== 'Dropped' && !(curIdx >= 0 && idx >= curIdx);
          return { sub, locked };
        })
      }));
    }

    async function uploadCampaignFile(campaignId, kind, file) {
      const ext = file.name.split('.').pop();
      const path = `${campaignId}/${kind}-${Date.now()}.${ext}`;
      const { error } = await supabase.storage.from('campaign-files').upload(path, file, { upsert: true });
      if (error) { toast(error.message, 'error'); return null; }
      return path; // store the path, sign on view
    }

    async function signedUrl(path) {
      if (!path) return null;
      const { data } = await supabase.storage.from('campaign-files').createSignedUrl(path, 3600);
      return data?.signedUrl || null;
    }

    // Legacy `imported_poc` values only ever stored a first name (e.g. "Tushi"), never the full
    // name — so comparing it against team_members.full_name ("Tushi Agarwal") with exact string
    // equality would show "pending migration" forever even after the campaign is correctly
    // reassigned to that exact person. Treat a first-name match as resolved.
    function pocIsResolved(poc, ownerFullName) {
      if (!poc || !ownerFullName) return false;
      const p = poc.trim().toLowerCase();
      const f = ownerFullName.trim().toLowerCase();
      return f === p || f.split(/\s+/)[0] === p;
    }

    function canEditCampaign(c) {
      if (!c || !state.me) return false;
      if (state.me.role === 'admin') return true;
      if (c.owner_id === state.me.user_id) return true;
      // TL of owner
      // We don't have ownership chain client-side; let server RLS reject if not allowed.
      if (state.me.role === 'tl') return true;
      return false;
    }

    // ===============================================================
    // STATUS CHANGE MODAL
    // ===============================================================
    // Auto-builds the tracking URL from Course ID, fmt, campaign name/date, platform, and collab type.
    // Medium codes are inferred from the one example we have (Youtube -> YTC) and extended consistently;
    // the UTM Link field stays editable so an agent can correct it if a platform's code is wrong.
    // Course ID / fmt are fixed per subject rather than typed manually. Only Math is configured so far —
    // add more subjects here once their Course ID / fmt values are provided.
    const SUBJECT_COURSE_MAP = {
      Math: { courseId: '15', fmt: '206' },
      Coding: { courseId: '1', fmt: '132' },
    };

    const PLATFORM_MEDIUM_CODE = { Instagram: 'IGC', Youtube: 'YTC', Facebook: 'FBC', Tiktok: 'TTC' };
    function buildUtmLink(c, fields) {
      const courseId = fields._course_id?.value.trim();
      const fmt = fields._fmt?.value.trim();
      if (!courseId || !fmt || !fields.gone_live_date.value) return;
      const sanitize = s => (s || '').replace(/[^a-zA-Z0-9]/g, '');
      // "UTM Medium" as displayed to the agent is fields.utm_content (deliverable type dropdown) —
      // use whatever they've picked there for the link, falling back to the platform code if unset.
      const medium = sanitize(fields.utm_content?.value) || PLATFORM_MEDIUM_CODE[c.platform?.platform] || 'REF';
      const influencerName = sanitize(c.platform?.profile?.name || c.name || '').toLowerCase();
      const [y, m, d] = fields.gone_live_date.value.split('-');
      const dateStr = `${d}${m}${y}`; // DDMMYYYY, no separators
      const content = fields.is_recollab.value === 'true' ? 'RCB' : fields.is_recollab.value === 'false' ? 'New' : '';
      const params = new URLSearchParams({
        courseId, fmt,
        utm_source: 'Influencer',
        utm_medium: medium,
        utm_campaign: `${influencerName}${dateStr}`,
        utm_content: content
      });
      fields.utm_link.value = `https://learn.brightchamps.com/book-trial-class?${params.toString()}#form`;
      if (fields.utm_medium) fields.utm_medium.value = medium;
    }

    function openStatusChangeModal(c) {
      const allowed = allowedSubStatuses(c.sub_status);

          payload.google_drive_link = fields.google_drive_link.value.trim() || null;

        const map = state.filterOptions?.sub_statuses || [];

        if (targetGroup !== 'Dropped' && targetGroup !== 'Post Gone Live') {

          if (cErr) { submitBtn.disabled = false; submitBtn.textContent = 'Save'; return toast(cErr.message, 'error'); }

          if (target && target !== c.sub_status) {
            await supabase.from('campaign_activities').insert({
              campaign_id: c.id, user_id: state.me.user_id, activity_type: 'stage_change',
              note: `${c.sub_status} → ${target}`,
              metadata: { from: c.sub_status, to: target, ...(followUpMeta || {}) },
            });
          }
        }

        modal.close();
        toast('Saved', 'success');
        if (target === 'Gone Live') celebrateGoneLive();
        await fetchCampaignDetail(c.id);
        render();
      });

      wrap.appendChild(el('div', { class: 'flex justify-end gap-2 pt-3 mt-3 border-t border-stone-200' },
        el('button', { class: 'px-3 py-1.5 text-sm rounded-lg border border-stone-200 bg-white hover:bg-stone-50', onClick: () => modal.close() }, 'Cancel'),
        submitBtn
      ));

    }

    // Lets an already-Gone-Live campaign's details (date/spends/UTM/collab type) be edited directly —
    // useful for regenerating a UTM link after the format changes, without touching sub_status.
    function openEditGoneLiveModal(c) {
      const fields = {};
      const wrap = el('div', { class: 'space-y-3' });

      fields.gone_live_date = el('input', { type: 'date', value: c.gone_live_date || '', class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' });
      fields.spends_inr     = el('input', { type: 'number', step: '0.01', value: c.spends_inr ?? '', class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' });

      // Reverse-detect courseId/fmt (and matching Subject) from the campaign's existing UTM link,
      // so changing any other field regenerates correctly without forcing a fresh Subject pick.
      let detectedCourseId = '', detectedFmt = '', detectedSubject = '';
      try {
        const u = new URL(c.utm_link || '', 'https://x');
        detectedCourseId = u.searchParams.get('courseId') || '';
        detectedFmt = u.searchParams.get('fmt') || '';
        detectedSubject = Object.keys(SUBJECT_COURSE_MAP).find(s =>
          SUBJECT_COURSE_MAP[s].courseId === detectedCourseId && SUBJECT_COURSE_MAP[s].fmt === detectedFmt) || '';
      } catch {}

      fields._course_id     = el('input', { type: 'hidden', value: detectedCourseId });
      fields._fmt            = el('input', { type: 'hidden', value: detectedFmt });
      fields._subject        = el('select', { class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' },
        el('option', { value: '' }, '— Pick to regenerate link —'),
        ...Object.keys(SUBJECT_COURSE_MAP).map(s => el('option', { value: s, selected: s === detectedSubject }, s))
      );
      fields._subject.addEventListener('change', () => {
        const m = SUBJECT_COURSE_MAP[fields._subject.value];
        fields._course_id.value = m ? m.courseId : '';
        fields._fmt.value = m ? m.fmt : '';
        buildUtmLink(c, fields);
      });
      fields.utm_link       = el('input', { type: 'url', value: c.utm_link || '', class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' });
      fields.utm_medium     = el('input', { type: 'hidden', value: c.utm_medium || '' });
      fields.utm_content    = el('select', { class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' },
        el('option', { value: '' }, '—'),
        ...(state.filterOptions?.utm_content || []).map(u => el('option', { value: u, selected: c.utm_content === u }, u))
      );
      fields.utm_content.addEventListener('change', () => buildUtmLink(c, fields));
      fields.is_recollab    = el('select', { class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg' },
        el('option', { value: '', selected: c.is_recollab == null }, '—'),
        el('option', { value: 'false', selected: c.is_recollab === false }, 'New collab'),
        el('option', { value: 'true', selected: c.is_recollab === true }, 'Re-collab (RCB)')
      );
      fields.rcb_count      = el('input', { type: 'number', value: c.rcb_count ?? '', disabled: !c.is_recollab, class: 'mt-1 w-full px-3 py-2 text-sm border border-stone-300 rounded-lg disabled:bg-stone-100' });
      fields.is_recollab.addEventListener('change', () => { fields.rcb_count.disabled = fields.is_recollab.value !== 'true'; buildUtmLink(c, fields); });
      fields.gone_live_date.addEventListener('input', () => buildUtmLink(c, fields));

      wrap.appendChild(el('p', { class: 'text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5' },
        'Pick a Subject below to regenerate the UTM Link in the current format. Leave it on "—" to keep the UTM Link as-is and just edit the other fields.'
      ));
      [
        ['Gone Live Date', fields.gone_live_date],
        ['Spends (₹)', fields.spends_inr],
        ['Subject (regenerates UTM Link)', fields._subject],
        ['UTM Link (editable)', fields.utm_link],
        ['UTM Medium *', fields.utm_content],
        ['UTM Content *', fields.is_recollab],
        ['RCB Count (if Re-collab)', fields.rcb_count],
      ].forEach(([lbl, inp]) => wrap.appendChild(el('label', { class: 'block' }, el('span', { class: 'text-xs font-medium text-stone-600' }, lbl), inp)));

      const submitBtn = el('button', { class: 'px-3 py-1.5 text-sm rounded-lg btn-brand' }, 'Save changes');
      submitBtn.addEventListener('click', async () => {
        const payload = {
          gone_live_date: fields.gone_live_date.value || null,
          spends_inr:     fields.spends_inr.value ? parseFloat(fields.spends_inr.value) : null,
          utm_link:       fields.utm_link.value.trim() || null,
          utm_medium:     fields.utm_medium.value.trim() || null,
          utm_content:    fields.utm_content.value || null,
          is_recollab:    fields.is_recollab.value === 'true' ? true : fields.is_recollab.value === 'false' ? false : null,
          rcb_count:      fields.rcb_count.value ? parseInt(fields.rcb_count.value) : null,
        };
        submitBtn.disabled = true; submitBtn.textContent = 'Saving…';
        const { error } = await supabase.from('campaigns').update(payload).eq('id', c.id);
        submitBtn.disabled = false; submitBtn.textContent = 'Save changes';
        if (error) return toast(error.message, 'error');
        modal.close();
        toast('Gone Live details updated', 'success');
        await fetchCampaignDetail(c.id);
        render();
      });

      wrap.appendChild(el('div', { class: 'flex justify-end gap-2 pt-3 mt-2 border-t border-stone-200' },
        el('button', { class: 'px-3 py-1.5 text-sm rounded-lg border border-stone-200 bg-white hover:bg-stone-50', onClick: () => modal.close() }, 'Cancel'),
        submitBtn
      ));
      const modal = renderModal('Edit Gone Live Details', wrap);
    }

              el('a', { href: `https://wa.me/${p.phone.replace(/\D/g,'')}`, target: '_blank', class: 'text-xs text-emerald-600 hover:underline' }, '·WhatsApp')
            ) : el('span', { class: 'text-stone-400' }, '—')),
          el('div', {}, el('span', { class: 'text-stone-500 text-xs' }, 'Region: '), p.region || '—'),
          el('div', {}, el('span', { class: 'text-stone-500 text-xs' }, 'Languages: '), (p.languages || []).join(', ') || '—'),
        )
      );

      const platforms = el('div', { class: 'space-y-4' },
        ...(p.platforms || []).map(pl => {
          const camps = (pl.campaigns || []).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
          return el('div', { class: 'bg-white border border-stone-200 rounded-xl overflow-hidden' },
            el('div', { class: 'px-4 py-3 border-b border-stone-200 flex items-center justify-between' },
              el('div', {},
                el('div', { class: 'font-medium text-sm' }, `${pl.platform} · @${pl.username}`),
                el('div', { class: 'text-xs text-stone-500 mt-0.5' }, [
                  pl.followers != null ? `${pl.followers.toLocaleString()} followers` : null,
                  pl.avg_views != null ? `${pl.avg_views.toLocaleString()} avg views` : null,
                  pl.genre || null,
                  pl.owner?.full_name ? `Owner: ${pl.owner.full_name}` : null,
                ].filter(Boolean).join(' · '))
              ),
              el('div', { class: 'flex items-center gap-3' },
                pl.link ? el('a', { href: pl.link, target: '_blank', class: 'text-xs text-brand hover:underline' }, 'Visit ↗') : null,
                el('button', { class: 'text-xs text-brand hover:underline',
                  onClick: () => openAddCampaignModal(pl, p, async () => { await fetchProfileDetail(p.id); render(); }) }, '+ New campaign'),
                el('button', { class: 'text-xs text-stone-500 hover:text-stone-800 hover:underline',
                  onClick: () => openEditPlatformModal(pl, async () => { await fetchProfileDetail(p.id); render(); }) }, 'Edit')
              )
            ),
            el('div', { class: 'divide-y divide-stone-100' },
              camps.length
                ? camps.map(c => el('div', { class: 'px-4 py-2.5 hover:bg-stone-50 cursor-pointer flex items-center justify-between gap-3',
                    onClick: () => { window.location.hash = `#campaigns/${c.id}`; } },
                    el('div', { class: 'flex items-center gap-2 min-w-0' },
                      el('span', { class: 'text-sm font-medium truncate' }, c.name),
                      el('span', { class: `badge ${groupStatusColor(c.group_status)}` }, c.group_status)
                    ),
                    el('div', { class: 'text-xs text-stone-500 shrink-0' },
                      (c.owner?.full_name || '—') + ' · ' + fmtDate(c.updated_at)
                    )
                  ))
                : [el('div', { class: 'px-4 py-3 text-xs text-stone-400' }, 'No campaigns')]
            )
          );
        }),
        !(p.platforms || []).length ? el('div', { class: 'bg-white border border-dashed border-stone-300 rounded-xl p-8 text-center text-sm text-stone-500' }, 'No platforms yet') : null
      );

      return el('div', {}, header, contact,
        el('h2', { class: 'text-sm font-semibold text-stone-700 mb-3' }, 'Platforms & Campaigns'),
        platforms
      );
    }

    // ===============================================================
    // ROUTING + MAIN RENDER
    // ===============================================================
    const ROUTES = {
      campaigns: { label: 'Campaigns', icon: '🎯', view: viewCampaigns, prefetch: fetchCampaigns },
      profiles:  { label: 'Profiles',  icon: '👤', view: viewProfiles,  prefetch: fetchProfiles },
      followups: { label: 'Follow-ups', icon: '⏰', view: viewFollowups, prefetch: fetchFollowups },
      agreement: { label: 'Agreement Form', icon: '📄', view: viewAgreementForm },
      reports:   { label: 'Reports',    icon: '📈', view: viewReports,   prefetch: fetchReports, adminOnly: true },
      team:      { label: 'Team',       icon: '👥', view: viewTeam,      prefetch: fetchTeam,    adminOnly: true },
    };

    function parseRoute() {
      const h = (window.location.hash || '#campaigns').slice(1);
      const [route, param] = h.split('/');
      state.route = ROUTES[route] ? route : 'campaigns';
      state.routeParam = param || null;
    }

    async function refresh(which) {
      const r = ROUTES[which];
      if (r?.prefetch) await r.prefetch();
      render();
    }

    function render() {
      const r = ROUTES[state.route];
      let body;
      if (state.routeParam && state.route === 'campaigns') {
        body = viewCampaignDetail();
      } else if (state.routeParam && state.route === 'profiles') {
        body = viewProfileDetail();
      } else {
        body = r.view();
      }

      const sidebar = el('aside', { id: 'sidebar', class: 'sidebar-mobile md:translate-x-0 fixed md:static z-30 inset-y-0 left-0 w-64 bg-white border-r border-stone-200 flex flex-col' },
        el('div', { class: 'px-6 py-5 border-b border-stone-200 flex items-center justify-between' },
          el('img', { src: 'data:image/png;base64,' + LOGO_B64, alt: 'BrightChamps', class: 'h-[100px] w-auto' }),
          el('button', { class: 'md:hidden text-stone-500 text-2xl leading-none', onClick: () => $('#sidebar').classList.remove('open') }, '×')
        ),
        el('div', { class: 'px-6 pt-4 pb-2 text-[10px] font-bold text-stone-400 uppercase tracking-widest' }, 'Influencer CRM'),
        el('nav', { class: 'flex-1 px-3 pb-3 space-y-0.5' },
          ...Object.entries(ROUTES)
            .filter(([k, r]) => !r.adminOnly || state.me?.role === 'admin')
            .map(([k, r]) => {
              const active = state.route === k;
              const badge = (k === 'followups' && state.overdueCount > 0)
                ? el('span', { class: `ml-auto text-[10px] font-bold px-1.5 py-0.5 rounded-full ${active ? 'bg-white/30 text-white' : 'bg-rose-500 text-white'}` }, String(state.overdueCount))
                : null;
              return el('a', {
                href: '#' + k,
                class: `flex items-center gap-3 px-3 py-2.5 text-sm rounded-xl transition-colors ${active ? 'text-white font-medium' : 'text-stone-700 hover:bg-stone-100'}`,
                style: active ? 'background-color: var(--brand);' : ''
              },
                el('span', { class: 'text-base' }, r.icon),
                el('span', {}, r.label),
                badge
              );
            })
        ),
        el('div', { class: 'px-4 py-3 border-t border-stone-200 bg-stone-50' },
          el('div', { class: 'flex items-center gap-2 mb-2' },
            el('div', { class: 'w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold', style: 'background-color: var(--brand);' },
              (state.me?.full_name || state.session.user.email || '?').charAt(0).toUpperCase()
            ),
            el('div', { class: 'flex-1 min-w-0' },
              el('div', { class: 'text-xs font-medium text-stone-800 truncate' }, state.me?.full_name || state.session.user.email),
              el('div', { class: 'text-[10px] text-stone-500 uppercase tracking-wide' }, state.me?.role || 'user')
            )
          ),
          el('button', { class: 'w-full text-xs text-stone-600 hover:text-stone-900 border border-stone-300 hover:border-stone-400 rounded px-2 py-1.5 bg-white transition-colors', onClick: signOut }, 'Sign out')
        )
      );

      const header = el('header', { class: 'md:hidden bg-white border-b border-stone-200 px-4 py-3 flex items-center justify-between' },
        el('button', { class: 'text-stone-700', onClick: () => $('#sidebar').classList.add('open') }, '☰'),
        el('div', { class: 'text-sm font-semibold' }, ROUTES[state.route]?.label),
        el('div', { class: 'w-6' })
      );

      const main = el('main', { class: 'flex-1 overflow-y-auto scrollbar-thin bg-stone-50' },
        header,
        el('div', { class: 'p-4 md:p-8 max-w-screen-2xl mx-auto' },
          body
        )
      );

      $('#app').innerHTML = '';
      $('#app').appendChild(el('div', { class: 'min-h-screen flex' }, sidebar, main));
    }

    // ===============================================================
    // INIT
    // ===============================================================
    function debounce(fn, ms) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    async function boot() {
      // First-time OAuth redirect: Supabase sets the session via hash → exchange happens inside getSession()
      const ok = await ensureSession();
      if (!ok) return renderLogin();

      if (!state.me) {
        // team_members row should be auto-created via the auth trigger, but allow a beat
        await new Promise(r => setTimeout(r, 500));
        state.me = await loadMe();
      }
      if (!state.me) {
        $('#app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-sm text-stone-600">Your account isn't provisioned yet. Ask an admin to add you to team_members.</div>`;
        return;
      }

      await loadFilterOptions();
      await refreshOverdueCount();
      parseRoute();
      if (state.routeParam && state.route === 'campaigns') await fetchCampaignDetail(state.routeParam);
      else if (state.routeParam && state.route === 'profiles') await fetchProfileDetail(state.routeParam);
      else await ROUTES[state.route].prefetch?.();
      render();

      window.addEventListener('hashchange', async () => {
        parseRoute();
        state.detail = { campaign: null, profile: null, activities: [], audit: [], loading: false };
        if (state.routeParam && state.route === 'campaigns') {
          state.detail.loading = true; render();
          await fetchCampaignDetail(state.routeParam);
        } else if (state.routeParam && state.route === 'profiles') {
          state.detail.loading = true; render();
          await fetchProfileDetail(state.routeParam);
        } else {
          const r = ROUTES[state.route];
          if (r?.prefetch) await r.prefetch();
        }
        await refreshOverdueCount();
        render();
        $('#sidebar')?.classList.remove('open');
      });
    }

    function renderLogin() {
      $('#app').innerHTML = '';
      $('#app').appendChild(
        el('div', { class: 'min-h-screen flex items-center justify-center p-4 bg-stone-50' },
          el('div', { class: 'bg-white border border-stone-200 rounded-2xl shadow-sm p-8 w-full max-w-sm text-center' },
            el('img', { src: 'data:image/png;base64,' + LOGO_B64, alt: 'BrightChamps', class: 'h-[88px] w-auto mx-auto mb-4' }),
            el('div', { class: 'text-lg font-semibold text-stone-900 mb-1' }, 'Influencer CRM'),
            el('div', { class: 'text-sm text-stone-500 mb-6' }, 'Sign in to continue'),
            el('button', {
              class: 'w-full px-4 py-2.5 btn-brand text-sm font-medium rounded-lg flex items-center justify-center gap-2',
              onClick: signIn
            }, '🔐  Sign in with Google'),
            el('p', { class: 'text-[11px] text-stone-400 mt-4' }, `Restricted to @${ALLOWED_DOMAIN} accounts`)
          )
        )
      );
    }

    boot().catch(e => { console.error(e); $('#app').innerHTML = `<pre class="p-6 text-xs text-rose-700">${escape(e.stack || e.message)}</pre>`; });
  </script>
</body>
</html>
