<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightChamps Influencer Agreement Form</title>
</head>
<body>
<div id="app-root"></div>
<style>
  :root{
    --ink:#1a2332;
    --paper:#ffffff;
    --muted:#5b6472;
    --line:#e3e7ee;
    --blue:#1e5fd9;
    --gold:#f4b400;
    --fill-bg:#fff7e0;
    --fill-border:#f0c94a;
    --ok:#1a8f5e;
  }
  *{box-sizing:border-box;}
  #app-root{
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color:var(--ink);
    max-width:760px;
    margin:0 auto;
    padding:8px 4px 40px;
  }
  .head{
    display:flex; align-items:center; gap:14px;
    margin-bottom:22px;
  }
  .head img{ height:40px; }
  .head .t{
    font-size:13px; letter-spacing:.04em; color:var(--muted); text-transform:uppercase; font-weight:600;
  }
  h1{
    font-size:22px; margin:0 0 4px; font-weight:700; letter-spacing:-0.01em;
  }
  .sub{ color:var(--muted); font-size:14px; margin:0 0 26px; line-height:1.5;}
  .card{
    background:var(--paper); border:1px solid var(--line); border-radius:14px;
    padding:22px 24px; margin-bottom:16px;
  }
  .field{ margin-bottom:18px; }
  .field:last-child{ margin-bottom:0; }
  label{
    display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink);
  }
  label .req{ color:#d84343; }
  label .hint{ display:block; font-weight:400; color:var(--muted); font-size:12px; margin-top:2px;}
  input, textarea{
    width:100%; border:1.5px solid var(--line); border-radius:9px; padding:10px 12px;
    font-size:14.5px; font-family:inherit; background:var(--fill-bg);
    transition:border-color .15s;
  }
  input:focus, textarea:focus{ outline:none; border-color:var(--blue); background:#fffdf5;}
  textarea{ resize:vertical; min-height:56px;}
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:560px){ .row2{ grid-template-columns:1fr; } }
  .err{ color:#c0392b; font-size:12px; margin-top:5px; display:none; }
  .field.invalid input, .field.invalid textarea{ border-color:#c0392b; }
  .field.invalid .err{ display:block; }
  .actions{ display:flex; align-items:center; gap:14px; margin-top:22px; }
  button.primary{
    background:var(--blue); color:#fff; border:none; border-radius:10px;
    padding:13px 22px; font-size:15px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
  }
  button.primary:hover{ background:#184dae; }
  button.primary:disabled{ background:#a9bcdc; cursor:default; }
  .status{ font-size:13.5px; color:var(--muted); }
  .status.ok{ color:var(--ok); font-weight:600; }
  .note{
    font-size:12.5px; color:var(--muted); line-height:1.6; margin-top:18px;
    border-top:1px solid var(--line); padding-top:14px;
  }
  .done-box{
    display:none; background:#eefaf3; border:1px solid #bfe8d3; border-radius:12px;
    padding:18px 20px; margin-top:16px; align-items:center; justify-content:space-between; gap:12px;
  }
  .done-box.show{ display:flex; }
  .done-box .dtext{ font-size:14px; font-weight:600; color:#12694a; }
  .done-box .dsub{ font-size:12.5px; color:#3a7a5f; font-weight:400; margin-top:2px;}
  a.dl{
    background:#12694a; color:#fff; text-decoration:none; padding:10px 16px; border-radius:8px;
    font-size:13.5px; font-weight:600; white-space:nowrap;
  }
  .spinner{
    width:15px; height:15px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite; display:inline-block;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
</style>

      </div>
      <div class="field" id="f-pay">
        <label>Payment turnaround <span class="req">*</span>
          <span class="hint">Days after invoice, written as shown</span>
        </label>
        <input id="in-pay" value="7 (seven)" />
        <div class="err">Please enter the payment window.</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="btn-generate">Generate my agreement PDF</button>
    <span class="status" id="status"></span>
  </div>

  <div class="done-box" id="done-box">
    <div>
      <div class="dtext">Your agreement is ready</div>
      <div class="dsub">Review it, then sign and send it back.</div>
    </div>
    <a class="dl" id="dl-link" download="Influencer_Agreement.pdf">Download PDF</a>
  </div>

  <p class="note">Nothing you type here is uploaded anywhere &mdash; the PDF is generated entirely in your browser and only leaves your device when you download it.</p>
`;

const fields = {
  name: document.getElementById('in-name'),
  country: document.getElementById('in-country'),
  date: document.getElementById('in-date'),
  address: document.getElementById('in-address'),
  fees: document.getElementById('in-fees'),
  currency: document.getElementById('in-currency'),
  email: document.getElementById('in-email'),
  deliv: document.getElementById('in-deliv'),
  pay: document.getElementById('in-pay'),
};

function validate(){
  let ok = true;
  const checks = [
    ['name','f-name', v=>v.trim().length>1],
    ['country','f-country', v=>v.trim().length>1],
    ['date','f-date', v=>v.trim().length>0],
    ['address','f-address', v=>v.trim().length>4],
    ['fees','f-fees', v=>v.trim().length>0],
    ['email','f-email', v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim())],
    ['deliv','f-deliv', v=>v.trim().length>0],
    ['pay','f-pay', v=>v.trim().length>0],
  ];
  checks.forEach(([key,id,fn])=>{
    const el = document.getElementById(id);
    if(!fn(fields[key].value)){ el.classList.add('invalid'); ok=false; }
    else{ el.classList.remove('invalid'); }
  });
  return ok;
}

const CURRENCY_LABELS = { INR:'INR', USD:'USD', EUR:'EUR', GBP:'GBP', AED:'AED' };
function formatFees(code, amount){
  if(!amount) return amount;
  if(CURRENCY_LABELS[code]) return `${CURRENCY_LABELS[code]} ${amount}`;
  return amount; // OTHER: assume the person typed their own currency label
}

function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

document.getElementById('btn-generate').addEventListener('click', async ()=>{
  const statusEl = document.getElementById('status');
  const doneBox = document.getElementById('done-box');
  doneBox.classList.remove('show');
  if(!validate()){
    statusEl.textContent = 'Please fill in all required fields.';
    statusEl.className = 'status';
    return;
  }
  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  statusEl.innerHTML = '<span class="spinner"></span> Generating your PDF...';
  statusEl.className = 'status';

  try{
    const data = {
      name: fields.name.value.trim(),
      country: fields.country.value.trim(),
      address: fields.address.value.trim(),
      date: fmtDate(fields.date.value),
      fees: formatFees(fields.currency.value, fields.fees.value.trim()),
      email: fields.email.value.trim(),
      deliv: fields.deliv.value.trim(),
      pay: fields.pay.value.trim(),
    };
    const bytes = await buildAgreementPdf(data);
    const blob = new Blob([bytes], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('dl-link');
    link.href = url;
    link.download = `Influencer_Agreement_${data.name.replace(/\s+/g,'_')}.pdf`;
    doneBox.classList.add('show');
    statusEl.textContent = '';
  }catch(e){
    console.error(e);
    statusEl.textContent = 'Something went wrong generating the PDF: ' + (e && e.message ? e.message : e);
  }finally{
    btn.disabled = false;
  }
});

// ---------- PDF BUILD ----------
async function buildAgreementPdf(data){
  const { PDFDocument, StandardFonts, rgb } = PDFLib;
  const pdfDoc = await PDFDocument.create();
  const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
  const bold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  const italic = await pdfDoc.embedFont(StandardFonts.HelveticaOblique);

  const headerImgBytes = Uint8Array.from(atob(HEADER_IMG_B64), c=>c.charCodeAt(0));
  const headerImg = await pdfDoc.embedPng(headerImgBytes);
  const headerDims = headerImg.scale(1);
  const PAGE_W = 612, PAGE_H = 792;
  // logo-only graphic (shield + wordmark + tagline); company name, CIN and the
  // divider line are drawn as real text/vector below so spacing is exact and
  // nothing can be cropped.
  const headerDrawWidth = 190;
  const headerDrawHeight = headerDrawWidth * (headerDims.height/headerDims.width);

  const MARGIN_L = 56, MARGIN_R = 56, MARGIN_TOP = 40, MARGIN_BOTTOM = 54;
  const CONTENT_W = PAGE_W - MARGIN_L - MARGIN_R;
  const BODY_SIZE = 10.2;
  const LINE_GAP = 13.0;
  const PARA_GAP = 7;

  let page, y, pageNum = 0;
  const allPages = [];

  function drawCenteredText(text, f, size, yPos, color){
    const tw = f.widthOfTextAtSize(text, size);
    page.drawText(text, { x:(PAGE_W-tw)/2, y:yPos, size, font:f, color: color || rgb(0.1,0.1,0.12) });
  }

  function drawFooter(pg, num){
    const label = 'BrightChamps Tech Private Limited \u00b7 Influencer Agreement';
    pg.drawText(label, { x: MARGIN_L, y: 26, size: 7.5, font, color: rgb(0.55,0.58,0.63) });
    const numText = String(num);
    const numW = font.widthOfTextAtSize(numText, 7.5);
    pg.drawText(numText, { x: PAGE_W - MARGIN_R - numW, y: 26, size: 7.5, font, color: rgb(0.55,0.58,0.63) });
    pg.drawLine({ start:{x:MARGIN_L,y:38}, end:{x:PAGE_W-MARGIN_R,y:38}, thickness:0.6, color: rgb(0.87,0.88,0.91) });
  }

  function newPage(){
    pageNum += 1;
    page = pdfDoc.addPage([PAGE_W, PAGE_H]);
    allPages.push(page);
    if(pageNum === 1){
      let hy = PAGE_H - MARGIN_TOP - headerDrawHeight;
      page.drawImage(headerImg, {
        x: (PAGE_W - headerDrawWidth)/2,
        y: hy,
        width: headerDrawWidth,
        height: headerDrawHeight,
      });
      let ty = hy - 16;
      drawCenteredText('BRIGHTCHAMPS TECH PRIVATE LIMITED', bold, 10.5, ty, rgb(0.1,0.1,0.12));
      ty -= 14;
      const cinLabel = 'CIN: ';
      const cinValue = 'U80902TG2020PTC141486';
      const lw = bold.widthOfTextAtSize(cinLabel, 9) + font.widthOfTextAtSize(cinValue, 9);
      let cx = (PAGE_W - lw)/2;
      page.drawText(cinLabel, { x:cx, y:ty, size:9, font:bold, color: rgb(0.2,0.2,0.22) });
      cx += bold.widthOfTextAtSize(cinLabel, 9);
      page.drawText(cinValue, { x:cx, y:ty, size:9, font, color: rgb(0.2,0.2,0.22) });
      ty -= 14;
      page.drawLine({ start:{x:MARGIN_L, y:ty}, end:{x:PAGE_W-MARGIN_R, y:ty}, thickness:2.4, color: rgb(0.05,0.05,0.07) });
      y = ty - 22;
    } else {
      y = PAGE_H - MARGIN_TOP;
    }
  }
  newPage();

  function ensureSpace(h){
    if(y - h < MARGIN_BOTTOM){ newPage(); }
  }

  // Standard PDF fonts (WinAnsi encoding) can't render every unicode character
  // (e.g. ₹, emoji, many non-Latin scripts). Swap those out for a safe fallback
  // instead of letting a single character crash the whole generation.
  function sanitize(str){
    return str.replace(/[^\x00-\x7E\u00A0-\u00FF\u20AC\u2018\u2019\u201C\u201D\u2013\u2014]/g, '?');
  }

  // runs: [{t:'text', b:bool, i:bool}]
  function drawParagraph(runs, opts={}){
    const size = opts.size || BODY_SIZE;
    const lineGap = opts.lineGap || LINE_GAP;
    const align = opts.align || 'left';
    const centerPage = opts.center || false;

    // tokenize into words carrying style
    const words = [];
    runs.forEach(r=>{
      sanitize(r.t).split(/(\s+)/).forEach(tok=>{
        if(tok.length===0) return;
        words.push({t:tok, b:r.b, i:r.i});
      });
    });

    let lines = [[]];
    let lineWidth = 0;
    words.forEach(w=>{
      const f = w.b ? bold : (w.i ? italic : font);
      const wWidth = f.widthOfTextAtSize(w.t, size);
      if(w.t.trim()===''){
        if(lineWidth + wWidth <= CONTENT_W){
          lines[lines.length-1].push(w);
          lineWidth += wWidth;
        }
        return;
      }
      if(lineWidth + wWidth > CONTENT_W && lines[lines.length-1].length>0){
        lines.push([]);
        lineWidth = 0;
      }
      lines[lines.length-1].push(w);
      lineWidth += wWidth;
    });

    lines.forEach(line=>{
      ensureSpace(lineGap);
      // trim trailing whitespace tokens
      while(line.length && line[line.length-1].t.trim()===''){ line.pop(); }
      let lineW = 0;
      line.forEach(w=>{
        const f = w.b ? bold : (w.i ? italic : font);
        lineW += f.widthOfTextAtSize(w.t, size);
      });
      let x = MARGIN_L;
      if(centerPage){ x = (PAGE_W - lineW)/2; }
      line.forEach(w=>{
        const f = w.b ? bold : (w.i ? italic : font);
        page.drawText(w.t, {x, y, size, font:f, color: w.b ? rgb(0.08,0.14,0.32) : rgb(0.12,0.12,0.14)});
        x += f.widthOfTextAtSize(w.t, size);
      });
      y -= lineGap;
    });
    y -= (opts.gapAfter !== undefined ? opts.gapAfter : PARA_GAP);
  }

  function heading(text){
    ensureSpace(20);
    y -= 3;
    drawParagraph([{t:text, b:true}], {size:10.8, gapAfter:5.5});
  }

  function title(text){
    drawParagraph([{t:text, b:true}], {size:14, center:true, gapAfter:12});
  }

  function para(runs, opts){ drawParagraph(runs, opts); }
  const N = (t)=>({t, b:false});
  const B = (t)=>({t, b:true});
  const I = (t)=>({t, i:true});

  // ---- CONTENT ----
  title('INFLUENCER AGREEMENT');

  para([N('This Influencer Agreement ("'),B('Agreement'),N('") is made and executed on '),B(data.date || '[date]'),N(' ("'),B('Effective Date'),N('").')]);

  heading('BY AND BETWEEN:');

  para([N('BrightChamps Tech Private Limited, a company incorporated under the Companies Act, 2013, having its registered office at 1st Floor, 36/6, Hustlehub, Somasundarapalya Main Rd, PWD Quarters, Sector 2, HSR Layout, Bengaluru, Karnataka – 560102, India ("'),B('Company'),N('", which expression shall, unless repugnant to the context, include its successors and permitted assigns);')]);

  heading('AND');

  para([B(data.name || '[Name]'),N(', a citizen of '),B(data.country || '[Country]'),N(', residing at '),B(data.address || '[Address]')]);

  para([N('("'),B('Professional'),N('", which expression shall, unless repugnant to the context, include his/her legal heirs, legal representatives, executors, administrators, and permitted assigns).')]);

  para([N('The Company and the Professional are individually referred to as a "'),B('Party'),N('" and collectively as the "'),B('Parties'),N('".')]);

  heading('WHEREAS:');

  para([N('A. The Company is, '),I('inter alia'),N(', engaged in the business of providing coding, STEM, and skill-development education to children and young learners under the brand "BrightChamps" ("'),B('Brand'),N('");')]);

  para([N('B. The Professional is a content creator/social media influencer engaged in the business of creating and publishing content across digital and social media platforms;')]);

  para([N('C. The Company wishes to engage the Professional, and the Professional has agreed to be engaged, on a non-exclusive basis, to create and publish promotional content for the Brand, on the terms set out below.')]);

  para([N('NOW, THEREFORE, in consideration of the mutual covenants contained herein, the Parties agree as follows:')]);

  heading('1. SCOPE OF ENGAGEMENT');
  para([N('The Company engages the Professional, on a non-exclusive basis, to create and publish audio-visual, visual, written, and/or static content for effecting the promotional campaign for the Brand (collectively, the "'),B('Deliverables'),N('").')]);

  heading('2. FEES & PAYMENT');
  para([N("a) Subject to the Professional's complete and satisfactory performance of the Deliverables, the Company shall pay the Professional up to "),B(data.fees || '[Fees]'),N(' (inclusive of GST, if applicable) ("'),B('Professional Fees'),N('").')]);
  para([N('b) Deliverables: '),B(data.deliv || '[Deliverables]')]);
  para([N('c) The Professional Fees shall be payable only after the Deliverables have been published in accordance with this Agreement and the Company receives a valid GST-compliant, undisputed invoice. Payment shall be made within '),B(data.pay || '[X]'),N(' days. If the Professional fails to provide the required deliverables, the Company may withhold payment without liability.')]);
  para([N('d) The Professional Fees are inclusive of all taxes (except applicable GST), royalties, and expenses incurred by the Professional, and shall be subject to applicable TDS.')]);
  para([N('e) If the Professional fails to publish the Deliverables in accordance with the agreed instructions or timelines, the Company may withhold payment or recover/refund any amounts already paid.')]);

  heading('3. OBLIGATIONS OF THE PROFESSIONAL');
  para([N('a) The Professional shall create the Deliverables and submit them to the Company for approval. Any changes requested by the Company shall be made by the Professional at no additional cost.')]);
  para([N('b) The Professional shall publish the approved Deliverables on the agreed platform(s) and within the agreed timeline.')]);
  para([N("c) The Professional shall comply with the Company's instructions and all applicable laws, regulations, and advertising guidelines in creating and publishing the Deliverables.")]);

  heading('4. CONTENT STANDARDS & BRAND SUITABILITY');
  para([N("The Professional acknowledges that the Brand serves children and young learners and that the Brand's reputation is paramount. Accordingly, the Professional shall ensure that: (a) the Deliverables and all related content are accurate, family-friendly, and free of obscene, defamatory, discriminatory, unlawful, sexually explicit, violent, or otherwise objectionable material; (b) the Deliverables contain no statement or claim about the Company, the Brand, or its products other than those expressly approved by the Company in writing; and (c) the Professional's own public conduct and social media presence, both before and during the Term, remains suitable for association with a brand catering to children and families, and the Professional shall promptly notify the Company in writing of any controversy or circumstance that may bring disrepute to the Company or Brand. Any breach of this Clause shall be a material breach entitling the Company to terminate this Agreement forthwith, without prejudice to its other remedies.")]);

  heading('5. ADVERTISING & REGULATORY COMPLIANCE');
  para([N('The Professional shall ensure all Deliverables comply with the applicable Advertising Standards Council of India ("ASCI") guidelines, including disclosure requirements for paid promotions/collaborations, as amended from time to time and as available at ascionline.in. Non-compliance shall be considered a material breach, and the Professional shall be solely responsible for remedial measures, including providing alternate deliverables at no additional cost if any Deliverable must be taken down due to non-compliance.')]);

  heading('6. REPRESENTATIONS & WARRANTIES');
  para([N('Each Party represents that it has full authority to enter into and perform this Agreement and that doing so does not breach any other agreement binding on it. The Professional further represents that: (i) their social media following and engagement are genuine and not artificially inflated; (ii) they have not engaged, and shall not engage, in any unlawful or unethical conduct; (iii) the Deliverables are original, do not infringe any third-party rights, and all necessary consents and permissions have been obtained; and (iv) they are not aware of any pending or threatened claims that could adversely affect the Company or the Brand.')]);

  heading('7. INTELLECTUAL PROPERTY RIGHTS');
  para([B('a) Ownership & Assignment: '),N('All Deliverables (including drafts, raw footage, edited versions, and all related content) and all intellectual property rights therein shall vest exclusively in the Company upon creation. The Professional irrevocably assigns all right, title, and interest, including copyright, to the Company worldwide for the full term of protection, without additional consideration beyond the Professional Fees.')]);
  para([B('b) License & Usage Rights: '),N("Without prejudice to the above, the Professional grants the Company an irrevocable, perpetual, worldwide, royalty-free, transferable and sub-licensable right to use, reproduce, edit, adapt, publish, distribute and otherwise exploit the Deliverables, including the Professional's name, image, likeness, voice and persona, in any media for the Company's business, marketing and promotional purposes.")]);
  para([B('c) Moral Rights: '),N('The Professional waives, to the extent permitted by law, all moral rights in the Deliverables and shall not object to their modification or use by the Company.')]);
  para([B('d) Survival: '),N('This Clause shall survive the expiry or termination of this Agreement.')]);
  para([B('e) Warranty: '),N('The Professional warrants that the Deliverables are original, do not infringe any third-party rights, and that all necessary consents and clearances (including for music, locations, and third-party appearances) have been obtained.')]);

  heading('8. EXCLUSIVITY & CONFLICT OF INTEREST');
  para([N("The Professional shall not, during the term, promote any business competing with the Company's coding, STEM, or children's skill-development business without the Company's prior written consent. The Professional shall promptly disclose any actual or potential conflict of interest. Any breach shall entitle the Company to terminate this Agreement immediately and recover any fees paid, in addition to other available remedies.")]);

  heading('10. CONFIDENTIALITY & DATA PROTECTION');
  para([N('The Professional shall keep this Agreement and all confidential, proprietary, or personal information received from the Company strictly confidential, use it only for performing this Agreement, and comply with all applicable data protection laws, including the Digital Personal Data Protection Act, 2023. Upon the Company\'s request or termination of this Agreement, the Professional shall promptly return or delete all such information. This Clause survives termination.')]);

  heading('11. INDEMNITY');
  para([N("The Professional shall indemnify and hold harmless the Company and its affiliates, directors, officers, employees, and representatives from any claims, losses, damages, liabilities, costs, or expenses (including reasonable legal fees) arising from the Professional's breach of this Agreement, the Deliverables, or infringement of any third-party rights. This Clause survives termination.")]);

  heading('12. LIMITATION OF LIABILITY');
  para([N("The Company's total liability under this Agreement shall not exceed the Professional Fees actually paid. The Company shall not be liable for any indirect, incidental, special, or consequential damages. This limitation shall not affect the Professional's indemnity obligations or the Company's right to recover or withhold Professional Fees.")]);

  heading('13. TERM');
  para([N('This Agreement shall commence on the Effective Date and continue for 3 (three) months, unless terminated earlier. The Professional shall complete all Deliverables within the Term. Clauses relating to Intellectual Property, Confidentiality, Indemnity, Non-Solicitation and Limitation of Liability shall survive expiry or termination.')]);

  heading('14. TERMINATION');
  para([N('The Company may terminate this Agreement immediately if the Professional breaches this Agreement (including failure to deliver or respond for 3 consecutive days), breaches Clauses 4 or 8, engages in conduct likely to harm the Company or Brand, if the campaign becomes unlawful or impossible, or at its sole discretion by written notice.')]);

  heading('15. CONSEQUENCES OF TERMINATION');
  para([N('Upon termination, the Professional shall cease creating or publishing Deliverables, stop using the Company\'s Confidential Information and brand assets, and refund any advance payment for unpublished or unapproved Deliverables within 3 (three) days. The Company shall only be liable to pay for Deliverables duly approved and published before termination, and all surviving obligations shall continue in effect.')]);

  heading('16. GOVERNING LAW & DISPUTE RESOLUTION');
  para([N('This Agreement shall be governed by the laws of India. Courts in Karnataka shall have exclusive jurisdiction. Any dispute shall be referred to a sole arbitrator mutually appointed by the Parties under the Arbitration and Conciliation Act, 1996. The seat of arbitration shall be Bengaluru, Karnataka, and the proceedings shall be conducted in English.')]);

  heading('17. NOTICES');
  para([N('Notices shall be sent by registered post, hardcopy, or email to '),B('Contact@brightchamps.com'),N(' for the Company, and '),B(data.email || '[email]'),N(' for the Professional.')]);

  heading('18. GENERAL PROVISIONS');
  para([N('a) This Agreement constitutes the entire agreement between the Parties and may be amended only in writing signed by both Parties.')]);
  para([N('b) No waiver of any right shall be effective unless made in writing. If any provision is held invalid, the remaining provisions shall continue in full force.')]);
  para([N('c) Neither Party shall be liable for delays caused by events beyond its reasonable control (except payment obligations).')]);
  para([N("d) The Company may assign this Agreement to any affiliate or successor. The Professional may not assign or subcontract this Agreement without the Company's prior written consent.")]);
  para([N('e) The Professional acts as an independent contractor and nothing in this Agreement creates any employment, partnership, or joint venture.')]);
  para([N("g) Neither Party shall make any statement that may harm the reputation of the other.")]);
  para([N('h) This Agreement may be executed in counterparts, including electronically.')]);
  para([N('i) Clauses relating to Intellectual Property, Confidentiality, Indemnity, Limitation of Liability, Exclusivity, Non-Solicitation and Governing Law shall survive termination.')]);
  para([N('j) The Company shall be entitled to injunctive or other equitable relief for any breach of Clauses 7, 8, 9, or 10, in addition to any other remedies available at law.')], {gapAfter:20});

  ensureSpace(130); // keep the closing + signature block together where possible
  para([B('IN WITNESS WHEREOF, the Parties have executed this Agreement as of the Execution Date mentioned above.')], {gapAfter:14});

  para([B('For and on behalf of BrightChamps Tech Private Limited')], {gapAfter:20});
  para([N('Signature: _________________________')], {gapAfter:4});
  para([N('Ravi Bhusan')], {gapAfter:22});

  para([B('By the Professional')], {gapAfter:20});
  para([N('Signature: _________________________')], {gapAfter:4});
  para([B(data.name || '[Name]')], {gapAfter:4});

  allPages.forEach((pg,i)=> drawFooter(pg, i+1));

  return pdfDoc.save();
}
